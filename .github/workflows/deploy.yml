name: RobTop CI (без деплоя)

# ДЕПЛОЙ РobTop идёт через вебхук Hostinger Git (Hostinger сам делает pull из ветки main при push).
# Этот workflow НИЧЕГО не деплоит и НЕ использует FTP. Он только быстро проверяет синтаксис JS,
# чтобы в main не уезжал сломанный код. Секреты FTP_* больше не нужны (можно удалить в Settings → Secrets).

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  check:
    name: Проверка синтаксиса JS (node --check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check всех .js в app/
        run: |
          set -e
          find app -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "check $f"
            node --check "$f"
          done
