<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07061a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="media/icon/icon-180.png">
<title>RobTop — Семья</title>
<link rel="icon" type="image/svg+xml" href="media/icon/icon.svg">
<style>
  /* ПОСАДОЧНАЯ для ссылок из писем: ?invite=<код> и ?reset=<код>.
     Консоль семьи упразднена 2026-06-07 — управление семьёй живёт в настройках приложения;
     без параметров страница сразу уводит в приложение. */
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--cyan:#19e3ff;--pink:#ff3db0;--mint:#38e8a0;--ink:#eaf2ff;--muted:#93a6cf}
  html,body{margin:0;min-height:100%}
  body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#05050f;
    background-image:radial-gradient(820px 600px at 14% 8%,rgba(166,75,255,.20),transparent 60%),
      radial-gradient(820px 680px at 88% 22%,rgba(25,227,255,.15),transparent 60%),
      radial-gradient(900px 800px at 50% 108%,rgba(255,43,214,.18),transparent 60%),
      linear-gradient(180deg,#070617 0%,#05040f 60%,#07041a 100%);min-height:100vh}
  .wrap{max-width:460px;margin:0 auto;padding:calc(22px + env(safe-area-inset-top)) 16px 40px}
  h1{font-family:'Russo One',sans-serif;font-size:26px;margin:0;color:#fff;text-shadow:0 0 12px rgba(25,227,255,.7),0 0 26px rgba(255,43,214,.5)}
  h1 b{color:var(--pink);font-weight:400}
  .sub{color:var(--muted);font-weight:600;font-size:13px;margin:2px 0 18px}
  .card{background:linear-gradient(162deg,rgba(26,23,56,.72),rgba(11,10,28,.74));border:1.5px solid rgba(255,255,255,.12);
    border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 8px 26px rgba(0,0,0,.4)}
  .card h2{font-family:'Russo One',sans-serif;font-weight:400;font-size:16px;margin:0 0 12px;color:#fff}
  label{display:block;font-weight:700;font-size:12.5px;color:#cfe0ff;margin:10px 0 5px}
  input{width:100%;border:1.6px solid rgba(255,255,255,.16);border-radius:13px;padding:13px;font-family:inherit;font-size:16px;
    font-weight:600;color:var(--ink);background:rgba(255,255,255,.05);outline:none}
  input:focus{border-color:var(--cyan)}
  .btn{width:100%;height:52px;border:none;border-radius:26px;cursor:pointer;font-family:'Russo One',sans-serif;font-size:16px;
    color:#04212b;margin-top:14px;background:linear-gradient(180deg,#3df0c0,#19c7e0);box-shadow:0 0 22px -6px var(--cyan)}
  .btn:active{transform:scale(.98)}
  .btn.sec{background:rgba(255,255,255,.06);color:#cfe0ff;border:1.5px solid rgba(255,255,255,.16);box-shadow:none;font-family:inherit;font-weight:800}
  .btn.pink{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff;box-shadow:0 0 22px -6px var(--pink)}
  .muted{color:var(--muted);font-size:13px;font-weight:600;line-height:1.5}
  .note{position:relative;flex:0 0 auto;width:100%;margin-top:10px;padding:10px 12px 10px 13px;border-radius:13px;
    background:#0d1430;border:1px solid rgba(255,255,255,.14);border-left:4px solid var(--cyan);
    font-size:13px;font-weight:600;color:#e7eeff;overflow-wrap:anywhere}
  .note::before{content:"\2139\FE0F";margin-right:7px;font-size:14px}
  .err{margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.45);
    color:#ffb3c0;font-size:13px;font-weight:700}
  a.plain{color:var(--cyan);font-weight:700;text-decoration:none}
  .small{font-size:12px}
  .center{text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div><h1>Rob<b>Top</b> · Семья</h1></div>
  <div class="sub" id="subline">Приглашение</div>
  <div id="app"></div>
  <div class="sub center small" style="margin-top:24px">
    <a class="plain" href="index.html">← Вернуться в приложение</a>
  </div>
</div>

<script>
"use strict";
var APP = document.getElementById('app');
var SUB = document.getElementById('subline');

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function h(html){ APP.innerHTML = html; }
function qs(id){ return document.getElementById(id); }
function errBox(msg){ return '<div class="err">'+esc(msg)+'</div>'; }
function param(name){ return new URLSearchParams(location.search).get(name); }
function toApp(){ location.href='index.html'; }

function api(op, body){
  body = body || {};
  body.op = op;
  return fetch('api/accounts.php', {
    method:'POST', headers:{'Content-Type':'application/json'},
    credentials:'same-origin', body: JSON.stringify(body)
  }).then(function(r){
    return r.json().catch(function(){ return {}; }).then(function(j){
      if(!r.ok){ var e = new Error(j && j.error ? j.error : ('Ошибка ' + r.status)); e.data=j; e.status=r.status; throw e; }
      return j;
    });
  });
}

/* ---------------- маршрутизация: ТОЛЬКО посадочные ---------------- */
function boot(){
  var reset = param('reset'), invite = param('invite');
  if(reset){ return screenReset(reset); }
  if(invite){ return screenInvite(invite); }
  location.replace('index.html'); // консоль упразднена: семьёй управляют в настройках приложения
}

/* ---------------- обязательная смена одноразового пароля ---------------- */
function screenChangePassword(){
  SUB.textContent = 'Смените одноразовый пароль';
  h('<div class="card"><h2>Новый пароль</h2>'+
    '<div class="muted small">Ты вошёл по одноразовому паролю. Придумай новый пароль, чтобы продолжить.</div>'+
    '<label>Новый пароль</label><input id="np" type="password" autocomplete="new-password">'+
    '<button class="btn" id="go">Сохранить</button><div id="msg"></div></div>');
  qs('go').onclick=function(){
    var np=qs('np').value;
    if(!np || np.length<4){ qs('msg').innerHTML=errBox('Минимум 4 символа'); return; }
    api('set_password',{new_password:np}).then(function(){ toApp(); })
      .catch(function(e){ qs('msg').innerHTML=errBox(e.message); });
  };
}

/* ---------------- посадочная приглашения ---------------- */
function screenInvite(token){
  SUB.textContent='Приглашение';
  h('<div class="card center muted">Проверяем приглашение…</div>');
  api('invite_info',{token:token}).then(function(info){
    if(!info.valid){
      // различаем статусы: «уже использовано» — это успех, а не ошибка
      var title='Приглашение недействительно', text='Ссылка истекла или отозвана. Попросите новую.';
      if(info.status==='accepted'){ title='Приглашение уже принято ✅'; text='Аккаунт по этой ссылке уже создан. Просто войдите в приложение со своим логином и паролем.'; }
      else if(info.status==='revoked'){ text='Приглашение отозвано отправителем.'; }
      else if(info.status==='expired' || info.status==='pending'){ text='Срок действия ссылки истёк. Попросите новую.'; }
      h('<div class="card"><h2>'+title+'</h2><div class="muted">'+text+'</div>'+
        '<button class="btn sec" id="home">В приложение</button></div>');
      qs('home').onclick=toApp;
      return;
    }
    var who = esc(info.inviter||'кто-то');
    if(info.type==='child_to_child'){
      h('<div class="card"><h2>Тебя позвал(а) '+who+' 🎉</h2>'+
        '<div class="muted small">Придумай никнейм (не настоящее имя!). Пароль задашь сразу после входа.</div>'+
        '<label>Твой никнейм</label><input id="nick">'+
        '<button class="btn pink" id="go">Присоединиться</button><div id="msg"></div></div>');
      qs('go').onclick=function(){
        var nick=qs('nick').value.trim();
        if(!nick){ qs('msg').innerHTML=errBox('Введите никнейм'); return; }
        api('accept',{token:token,nickname:nick}).then(function(r){
          try{ history.replaceState(null,'','family.html'); }catch(x){} // чтобы обновление страницы не показало «уже использовано»
          if(r.user && r.user.mustChangePassword){ return screenChangePassword(); }
          toApp();
        }).catch(function(e){ qs('msg').innerHTML=errBox(e.message); });
      };
    } else {
      // child_invite_parent: приглашает САМ ребёнок — родитель получает свою семью и primary-опеку
      var head = (info.type==='child_invite_parent')
        ? 'Ваш ребёнок '+who+' приглашает вас 👪'
        : 'Вас пригласил(а) '+who;
      var hint = (info.type==='child_invite_parent')
        ? 'Создайте родительский аккаунт — вы станете настоящим родителем '+who+' в RobTop: своя семья, статистика и управление. Email берётся из приглашения.'
        : 'Создайте родительский аккаунт. Email берётся из приглашения. Дальше всё — в настройках приложения.';
      h('<div class="card"><h2>'+head+'</h2>'+
        '<div class="muted small">'+hint+'</div>'+
        '<label>Ваш никнейм</label><input id="nick">'+
        '<label>Пароль</label><input id="pass" type="password" autocomplete="new-password">'+
        '<button class="btn pink" id="go">Принять приглашение</button><div id="msg"></div></div>');
      qs('go').onclick=function(){
        var nick=qs('nick').value.trim(), pass=qs('pass').value;
        if(!nick||!pass){ qs('msg').innerHTML=errBox('Заполните поля'); return; }
        api('accept',{token:token,nickname:nick,password:pass}).then(function(){
          try{ history.replaceState(null,'','family.html'); }catch(x){}
          toApp();
        }).catch(function(e){ qs('msg').innerHTML=errBox(e.message); });
      };
    }
  }).catch(function(e){
    h('<div class="card">'+errBox(e.message)+'<button class="btn sec" id="home">В приложение</button></div>');
    qs('home').onclick=toApp;
  });
}

/* ---------------- сброс пароля по ссылке из письма ---------------- */
function screenReset(token){
  SUB.textContent='Сброс пароля';
  h('<div class="card"><h2>Новый пароль</h2>'+
    '<label>Новый пароль</label><input id="np" type="password" autocomplete="new-password">'+
    '<button class="btn" id="go">Сохранить</button><div id="msg"></div></div>');
  qs('go').onclick=function(){
    var np=qs('np').value;
    if(!np||np.length<4){ qs('msg').innerHTML=errBox('Минимум 4 символа'); return; }
    api('reset',{token:token,new_password:np}).then(function(){
      qs('msg').innerHTML='<div class="note">Пароль изменён. Сейчас откроется приложение — войдите с новым паролем.</div>';
      setTimeout(toApp, 1400);
    }).catch(function(e){ qs('msg').innerHTML=errBox(e.message); });
  };
}

boot();
</script>
</body>
</html>
