<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07061a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RobTop">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="media/icon/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="media/icon/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="media/icon/icon.svg">
<title>RobTop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rubik:wght@400;500;600;700;800&display=swap&subset=cyrillic" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --cyan:#19e3ff; --magenta:#ff2bd6; --pink:#ff3db0; --purple:#a64bff;
    --blue:#3b6bff; --green:#2bf0c0; --mint:#38e8a0; --gold:#ffd23b; --red:#ff4d6d;
    --ink:#eaf2ff; --muted:#93a6cf;
    --accent:#ff3db0; --accent-2:#a64bff;
  }
  html{background:#05050f}
  html,body{margin:0;padding:0;min-height:100%;overscroll-behavior:none}
  body{
    font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink); background:#05050f; min-height:100vh; overflow-x:hidden;
    background-image:
      radial-gradient(820px 600px at 14% 8%, rgba(166,75,255,.20), transparent 60%),
      radial-gradient(820px 680px at 88% 22%, rgba(25,227,255,.15), transparent 60%),
      radial-gradient(900px 800px at 50% 108%, rgba(255,43,214,.18), transparent 60%),
      linear-gradient(180deg,#070617 0%, #05040f 60%, #07041a 100%);
  }
  #bg{position:fixed;inset:0;z-index:0;display:block}
  #root{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh}

  .view{display:none;padding:0 16px}
  .view.active{display:block;animation:viewin .32s ease both}
  @keyframes viewin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* ===================== HOME ===================== */
  #home{padding-bottom:130px}
  .hometop{padding:calc(30px + env(safe-area-inset-top)) 6px 14px;position:relative}
  .brand{font-family:'Russo One',sans-serif;font-size:40px;letter-spacing:1px;line-height:1;margin:0;color:#fff;
    text-shadow:0 0 12px rgba(25,227,255,.7), 0 0 28px rgba(255,43,214,.6)}
  .brand b{color:var(--pink);font-weight:400}
  .tagline{margin:8px 2px 0;color:var(--muted);font-weight:600;font-size:15px;letter-spacing:.2px}
  .tagline .spark{color:var(--cyan)}

  .apps{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:18px}
  .tile{position:relative;display:flex;flex-direction:column;gap:11px;align-items:flex-start;
    border-radius:20px;padding:17px 15px;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);
    background:linear-gradient(162deg, rgba(26,23,56,.72), rgba(11,10,28,.74));
    border:1.5px solid color-mix(in srgb, var(--c) 50%, transparent);
    box-shadow:0 8px 26px rgba(0,0,0,.46), 0 0 26px -10px var(--c), inset 0 1px 0 rgba(255,255,255,.04);
    transition:transform .14s ease, box-shadow .22s ease}
  .tile:active{transform:scale(.965)}
  .tile .ic{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;color:var(--c);
    background:radial-gradient(circle at 50% 38%, color-mix(in srgb,var(--c) 32%, transparent), transparent 72%);
    filter:drop-shadow(0 0 7px var(--c))}
  .tile .ic svg{width:30px;height:30px}
  .tile .txt{display:flex;flex-direction:column;gap:2px}
  .tile .nm{font-weight:700;font-size:15px;color:#eef4ff;line-height:1.15}
  .tile .st{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--c);opacity:.92}
  .tile.soon{opacity:.52;filter:saturate(.65)}
  .tile.soon .st{color:#90a2c6}
  .tile.soon .lock{position:absolute;top:13px;right:13px;color:#90a2c6;opacity:.8}
  .tile.soon .lock svg{width:15px;height:15px}
  .tile.wide{grid-column:1 / -1;flex-direction:row;align-items:center;gap:16px;padding:18px 18px}
  .tile.wide .ic{width:56px;height:56px}
  .tile.active{box-shadow:0 8px 26px rgba(0,0,0,.5), 0 0 32px -6px var(--c), inset 0 1px 0 rgba(255,255,255,.06)}
  .tile.active .ring{content:"";position:absolute;inset:-1.5px;border-radius:21px;border:1.6px solid var(--c);
    pointer-events:none;animation:ring 2.3s ease-in-out infinite}
  @keyframes ring{0%,100%{opacity:.15;box-shadow:0 0 0 var(--c)}50%{opacity:.85;box-shadow:0 0 22px -2px var(--c)}}

  /* ===================== WISHLIST ===================== */
  #wishlist{padding-bottom:150px}
  .wl-header{display:flex;align-items:center;gap:12px;padding:calc(20px + env(safe-area-inset-top)) 2px 8px}
  .back,.hbtn{flex:none;width:46px;height:46px;border-radius:15px;display:grid;place-items:center;cursor:pointer;
    background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.14);color:#bfe9ff;
    box-shadow:0 0 18px -7px var(--cyan)}
  .back:active,.hbtn:active{transform:scale(.93)}
  .back svg,.hbtn svg{width:22px;height:22px}
  .wl-head-main{flex:1;min-width:0}
  .wl-title{font-family:'Russo One',sans-serif;font-size:26px;color:#fff;display:flex;align-items:center;gap:10px;
    text-shadow:0 0 12px rgba(255,61,176,.75), 0 0 24px rgba(166,75,255,.55)}
  .wl-title .cic{color:var(--pink);filter:drop-shadow(0 0 8px var(--pink));display:grid;place-items:center}
  .wl-title .cic svg{width:25px;height:25px}
  .wl-sub{margin:0;color:var(--muted);font-weight:600;font-size:13px}

  #wishlist[data-tab="want"]{--accent:#ff3db0;--accent-2:#ff2bd6}
  #wishlist[data-tab="thinking"]{--accent:#a64bff;--accent-2:#7b3ff2}
  #wishlist[data-tab="bought"]{--accent:#2bf0c0;--accent-2:#19e3ff}

  .tabs{display:flex;gap:9px;position:sticky;top:env(safe-area-inset-top);z-index:6;margin:10px -16px 0;padding:12px 16px 10px;
    background:linear-gradient(180deg, rgba(7,6,23,.86) 62%, rgba(7,6,23,0))}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit;
    border-radius:15px;padding:10px 6px;color:#cfe0ff;
    background:rgba(255,255,255,.045);border:1.5px solid rgba(255,255,255,.1);
    transition:transform .12s, box-shadow .2s, background .2s}
  .tab .t-label{font-weight:800;font-size:14px;display:flex;align-items:center;gap:7px}
  .tab .dot{width:8px;height:8px;border-radius:50%}
  .tab[data-tab="want"] .dot{background:var(--pink);box-shadow:0 0 8px var(--pink)}
  .tab[data-tab="thinking"] .dot{background:var(--purple);box-shadow:0 0 8px var(--purple)}
  .tab[data-tab="bought"] .dot{background:var(--green);box-shadow:0 0 8px var(--green)}
  .tab .badge{font-size:12px;font-weight:800;color:#aeb9d6;background:rgba(255,255,255,.08);border-radius:999px;padding:1px 9px;min-width:22px;text-align:center}
  .tab.active{color:#fff;border-color:transparent;transform:translateY(-1px);
    background:linear-gradient(180deg, var(--accent), color-mix(in srgb,var(--accent) 55%, #120a1e));
    box-shadow:0 0 22px -4px var(--accent)}
  .tab.active .dot{display:none}
  .tab.active .badge{background:rgba(255,255,255,.26);color:#fff}

  .list{display:flex;flex-direction:column;gap:14px;padding-top:8px}
  .card{position:relative;border-radius:22px;overflow:hidden;animation:pop .3s ease both;cursor:pointer;
    background:linear-gradient(165deg, rgba(22,20,50,.86), rgba(9,8,24,.9));
    border:1.5px solid rgba(255,255,255,.07);
    box-shadow:0 12px 30px rgba(0,0,0,.55), 0 0 26px -12px var(--accent)}
  .card.shine{border-color:rgba(43,240,192,.34);box-shadow:0 12px 30px rgba(0,0,0,.55), 0 0 30px -8px var(--green)}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
  .card-img{height:172px;background-size:cover;background-position:center;position:relative}
  .card-img.placeholder{display:grid;place-items:center;
    background:radial-gradient(circle at 50% 34%, color-mix(in srgb,var(--accent) 26%, transparent), rgba(8,8,22,.92))}
  .ph-emoji{font-size:58px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.55))}
  .ph-cherry{color:var(--accent);filter:drop-shadow(0 0 12px var(--accent))}
  .ph-cherry svg{width:74px;height:74px}
  .fav-btn{position:absolute;top:11px;right:11px;width:40px;height:40px;border-radius:50%;cursor:pointer;
    border:1px solid rgba(255,255,255,.16);background:rgba(10,10,26,.6);backdrop-filter:blur(4px);
    display:grid;place-items:center;color:#cfd8ef}
  .fav-btn:active{transform:scale(.9)}
  .fav-btn svg{width:21px;height:21px}
  .fav-btn.on{color:var(--gold);border-color:rgba(255,210,59,.55);box-shadow:0 0 16px -3px var(--gold)}
  .bought-badge{position:absolute;left:11px;top:11px;display:flex;align-items:center;gap:5px;
    background:linear-gradient(180deg,#2bf0c0,#12b48c);color:#04231c;font-weight:800;font-size:12.5px;
    padding:5px 11px 5px 8px;border-radius:999px;box-shadow:0 0 16px -3px var(--green)}
  .bought-badge svg{width:15px;height:15px}
  .card-body{padding:14px 16px 16px}
  .card-title{font-family:'Russo One',sans-serif;font-weight:400;font-size:18px;margin:0;color:#fff;line-height:1.22;letter-spacing:.2px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:999px;display:inline-flex;gap:5px;align-items:center;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#cdd9f5}
  .chip svg{width:13px;height:13px}
  .chip.mind{color:#dcc2ff;border-color:rgba(166,75,255,.45)}
  .chip.buy{color:#9ff0d8;border-color:rgba(43,240,192,.45)}
  .chip.time{color:#bdeeff;border-color:rgba(25,227,255,.4)}
  .note-prev{margin-top:9px;color:#aab8d8;font-size:13.5px;font-style:italic;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-link{display:inline-flex;align-items:center;gap:6px;margin-top:9px;color:var(--accent);font-weight:700;font-size:14px;text-decoration:none;
    filter:drop-shadow(0 0 6px color-mix(in srgb,var(--accent) 60%, transparent))}
  .card-link svg{width:14px;height:14px}
  .card-actions{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap}
  .btn{flex:1;min-width:120px;border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 10px;cursor:pointer;
    font-family:inherit;font-weight:800;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:7px;
    background:rgba(255,255,255,.05);color:#e7eeff;transition:transform .1s, filter .15s}
  .btn:active{transform:scale(.96)}
  .btn svg{width:17px;height:17px}
  .btn-bought{background:linear-gradient(180deg,#2bf0c0,#10ad85);color:#03241c;border-color:transparent;box-shadow:0 0 18px -5px var(--green)}
  .btn-want{background:linear-gradient(180deg,#ff5db0,#df1a84);color:#fff;border-color:transparent;box-shadow:0 0 18px -5px var(--pink)}
  .btn-think{background:rgba(166,75,255,.16);color:#dcc2ff;border-color:rgba(166,75,255,.5)}
  .btn-ghost{background:rgba(25,227,255,.12);color:#bdeeff;border-color:rgba(25,227,255,.5)}
  .btn-danger{background:rgba(255,77,109,.14);color:#ffb3c0;border-color:rgba(255,77,109,.5)}

  .empty{text-align:center;padding:46px 24px;margin-top:10px;border-radius:24px;
    background:rgba(13,12,32,.6);border:1.5px dashed color-mix(in srgb,var(--accent) 45%, transparent);animation:pop .3s both}
  .empty-ic{width:86px;height:86px;margin:0 auto 8px;display:grid;place-items:center;color:var(--accent);filter:drop-shadow(0 0 14px var(--accent))}
  .empty-ic svg{width:66px;height:66px}
  .empty h3{font-family:'Russo One',sans-serif;font-weight:400;color:#fff;margin:4px 0 8px;font-size:19px}
  .empty p{margin:0;color:var(--muted);font-size:15px;font-weight:600;line-height:1.45}

  /* ===================== HUD ===================== */
  .hud{position:fixed;left:0;right:0;bottom:0;z-index:14;pointer-events:none;
    max-width:480px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 22px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, rgba(5,4,15,.86), transparent)}
  .hud .big{font-family:'Russo One',sans-serif;font-size:34px;color:#fff;line-height:.95;text-shadow:0 0 14px rgba(255,255,255,.22)}
  .hud .lbl{font-weight:700;font-size:13px;letter-spacing:.4px;margin-top:3px}
  .hud-l{font-weight:800;font-size:14px;color:var(--mint);text-shadow:0 0 12px rgba(56,232,160,.5);padding-bottom:3px}
  .hud-l b{color:#dffaef}
  .hud-c{text-align:center}.hud-c .lbl{color:var(--cyan)}
  .hud-r{text-align:right}.hud-r .lbl{color:var(--pink)}

  /* ===================== FAB ===================== */
  .fab{position:fixed;z-index:20;display:none;align-items:center;gap:10px;
    bottom:calc(70px + env(safe-area-inset-bottom));right:max(18px, calc(50vw - 222px));
    height:58px;padding:0 22px 0 18px;border:none;border-radius:30px;cursor:pointer;color:#fff;
    font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:.3px;
    background:linear-gradient(180deg,#ff5db0,#d51a82);
    box-shadow:0 0 28px -3px var(--pink), 0 12px 26px rgba(0,0,0,.5)}
  body[data-view="wishlist"] .fab{display:flex}
  .fab:active{transform:scale(.95)}
  .fab .plus{width:26px;height:26px;display:grid;place-items:center;background:rgba(255,255,255,.24);border-radius:50%;font-size:21px;line-height:1}

  /* ===================== SHEETS ===================== */
  .overlay{position:fixed;inset:0;z-index:30;background:rgba(4,3,14,.62);backdrop-filter:blur(3px);
    display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex;animation:fade .2s both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:10px 18px calc(22px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(24,21,52,.97), rgba(10,9,26,.99));
    border-top:1.5px solid color-mix(in srgb,var(--pink) 55%, transparent);
    box-shadow:0 -12px 50px rgba(255,43,214,.18);max-height:92vh;overflow:auto;
    animation:slideup .26s cubic-bezier(.2,.8,.2,1) both;color:var(--ink)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .grip{width:44px;height:5px;border-radius:3px;background:rgba(255,255,255,.28);margin:6px auto 12px;cursor:grab}
  .grip-hit{padding:6px 0 2px;margin:-6px 0 0;touch-action:none}
  .demo-badge{position:fixed;left:12px;bottom:calc(120px + env(safe-area-inset-bottom));z-index:16;display:none;
    background:rgba(255,210,59,.16);color:#ffd23b;border:1px solid rgba(255,210,59,.5);
    font-weight:800;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border-radius:999px}
  body.demo .demo-badge{display:block}
  .sheet h2{font-family:'Russo One',sans-serif;font-weight:400;font-size:21px;margin:0 0 14px;text-align:center;color:#fff;
    text-shadow:0 0 12px rgba(255,61,176,.6)}
  .photo-pick{position:relative;height:182px;border-radius:18px;overflow:hidden;cursor:pointer;
    background:rgba(255,255,255,.03);border:2px dashed rgba(255,61,176,.45);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#ff9ed1;font-weight:700}
  .photo-pick svg{width:44px;height:44px}
  .photo-pick .ppreview{position:absolute;inset:0;background-size:cover;background-position:center;display:none}
  .photo-pick.has-photo{border-style:solid;border-color:rgba(255,255,255,.12)}
  .photo-pick.has-photo .ppreview{display:block}
  .photo-pick .pp-edit{position:absolute;right:10px;bottom:10px;background:rgba(8,8,22,.8);color:#ffd0e8;
    font-size:13px;font-weight:800;padding:7px 12px;border-radius:999px;display:none;border:1px solid rgba(255,61,176,.5)}
  .photo-pick.has-photo .pp-edit{display:block}
  .photo-pick.uploading::before{content:"Загрузка фото…";position:absolute;inset:0;display:grid;place-items:center;background:rgba(8,8,22,.6);color:#fff;font-weight:800;font-size:14px;z-index:3}
  .field{margin-top:14px}
  .field label{display:block;font-weight:800;font-size:14px;color:#c3d2f2;margin-bottom:6px;padding-left:4px}
  .field .opt{color:#8aa0c8;font-weight:700;font-size:12.5px}
  .field input,.field textarea{width:100%;border:1.6px solid rgba(255,255,255,.14);border-radius:14px;padding:13px 14px;
    font-family:inherit;font-size:16px;font-weight:600;color:var(--ink);background:rgba(255,255,255,.04);outline:none;transition:border-color .15s, box-shadow .15s}
  .field textarea{resize:none;min-height:70px;line-height:1.4}
  .field input::placeholder,.field textarea::placeholder{color:#6f80a6}
  .field input:focus,.field textarea:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,61,176,.16)}
  .sheet-actions{display:flex;gap:10px;margin-top:20px}
  .sheet-actions .btn{padding:14px}
  .btn-primary{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff;font-size:16px;border-color:transparent;box-shadow:0 0 20px -5px var(--pink)}
  .btn-cancel{background:rgba(255,255,255,.06);color:#aab8d6;flex:0 0 38%}

  /* ----- detail sheet ----- */
  .sheet.detail{border-top-color:color-mix(in srgb,var(--accent) 55%, transparent)}
  .d-media{position:relative;height:200px;border-radius:18px;overflow:hidden;margin-bottom:14px}
  .d-media .card-img{height:100%}
  .d-title{font-family:'Russo One',sans-serif;font-weight:400;font-size:23px;margin:0 0 4px;color:#fff;line-height:1.2}
  .d-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
  .d-fav{display:inline-flex;align-items:center;gap:8px;cursor:pointer;border-radius:14px;padding:10px 14px;font-weight:800;font-size:14px;
    background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.14);color:#cdd9f5}
  .d-fav svg{width:18px;height:18px}
  .d-fav.on{color:var(--gold);border-color:rgba(255,210,59,.55);box-shadow:0 0 16px -4px var(--gold)}
  .d-note{margin-top:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;
    padding:12px 14px;color:#d6e0f6;font-size:14.5px;line-height:1.45}
  .d-note .lab{display:block;font-size:11.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#8aa0c8;margin-bottom:4px}
  .d-sec-title{font-weight:800;font-size:13px;letter-spacing:.6px;text-transform:uppercase;color:#9fb0d6;margin:18px 0 10px;padding-left:2px;
    display:flex;align-items:center;gap:8px}
  .d-sec-title svg{width:16px;height:16px;color:var(--accent)}
  .dgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
  .dstat{border-radius:14px;padding:12px 13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
  .dstat .n{font-family:'Russo One',sans-serif;font-size:24px;color:#fff;line-height:1}
  .dstat .l{font-size:12px;font-weight:700;color:#9fb0d6;margin-top:3px}
  .dstat.zero{opacity:.42}
  .dstat.mind .n{color:#caa7ff}.dstat.buy .n{color:#7af0cf}.dstat.ret .n{color:#ff9ed1}.dstat.edit .n{color:#ffe08a}
  .tl{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .tl-row{display:flex;align-items:center;gap:11px}
  .tl-ic{flex:none;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12)}
  .tl-tx{font-weight:700;font-size:14.5px;color:#e7eeff}
  .tl-dt{margin-left:auto;font-size:12.5px;color:#8aa0c8;font-weight:600}

  /* ----- purchase confirm ----- */
  .sheet.purchase{border-top-color:rgba(43,240,192,.6);box-shadow:0 -12px 50px rgba(43,240,192,.2)}
  .pc-emoji{font-size:54px;text-align:center;filter:drop-shadow(0 0 16px rgba(43,240,192,.6))}

<script>
/* ================= ANIMATED NEON BACKGROUND ================= */
(function(){
  var cv=document.getElementById("bg");
  var ctx=cv.getContext && cv.getContext("2d");
  if(!ctx) return;
  var W=0,H=0,DPR=1,circuit=null,orbs=[],sprites={},raf=null;
  var reduce=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var PAL=[[25,227,255],[255,43,214],[166,75,255],[59,107,255],[43,240,192],[255,210,59],[255,77,109]];
  function rgba(c,a){ return "rgba("+c[0]+","+c[1]+","+c[2]+","+a+")"; }
  function sprite(c){
    var key=c.join(","); if(sprites[key]) return sprites[key];
    var s=128,cn=document.createElement("canvas"); cn.width=cn.height=s;
    var g=cn.getContext("2d"),r=s/2,grd=g.createRadialGradient(r,r,0,r,r,r);
    grd.addColorStop(0,rgba(c,.95)); grd.addColorStop(.18,rgba(c,.6)); grd.addColorStop(.5,rgba(c,.16)); grd.addColorStop(1,rgba(c,0));
    g.fillStyle=grd; g.beginPath(); g.arc(r,r,r,0,7); g.fill(); sprites[key]=cn; return cn;
  }
  function buildCircuit(){
    circuit=document.createElement("canvas"); circuit.width=Math.max(1,W*DPR); circuit.height=Math.max(1,H*DPR);
    var g=circuit.getContext("2d"); g.setTransform(DPR,0,0,DPR,0,0);
    var step=28,n=Math.round((W*H)/14000);
    for(var i=0;i<n;i++){
      var c=PAL[(Math.random()*PAL.length)|0];
      var x=Math.round(Math.random()*W/step)*step, y=Math.round(Math.random()*H/step)*step, segs=2+(Math.random()*4|0);
      g.strokeStyle=rgba(c,.16); g.lineWidth=1.7; g.lineCap="round"; g.lineJoin="round";
      g.shadowColor=rgba(c,.55); g.shadowBlur=6; g.beginPath(); g.moveTo(x,y);
      for(var s2=0;s2<segs;s2++){ if(Math.random()<.5) x+=(Math.random()<.5?-1:1)*step*(1+(Math.random()*3|0)); else y+=(Math.random()<.5?-1:1)*step*(1+(Math.random()*3|0)); g.lineTo(x,y); }
      g.stroke(); g.shadowBlur=0; g.fillStyle=rgba(c,.5); g.beginPath(); g.arc(x,y,2.3,0,7); g.fill();
    }
  }
  function buildOrbs(){
    orbs=[]; var area=W*H,count=Math.min(78,Math.max(36,Math.round(area/12000)));
    for(var i=0;i<count;i++){
      var t=Math.random(),r=t<.6?2+Math.random()*4:(t<.86?6+Math.random()*6:12+Math.random()*12);
      var sp=reduce?0:(.05+Math.random()*.32),a=Math.random()*6.28;
      orbs.push({x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:r,glow:2.7+Math.random()*1.2,col:PAL[(Math.random()*PAL.length)|0],al:.5+Math.random()*.45,ph:Math.random()*6.28});
    }
  }
  function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight; cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+"px"; cv.style.height=H+"px"; ctx.setTransform(DPR,0,0,DPR,0,0); buildCircuit(); buildOrbs(); }
  function draw(t){
    ctx.clearRect(0,0,W,H); if(circuit) ctx.drawImage(circuit,0,0,W,H);
    ctx.globalCompositeOperation="lighter";
    for(var i=0;i<orbs.length;i++){
      var o=orbs[i]; o.x+=o.vx; o.y+=o.vy; var m=o.r*o.glow;
      if(o.x<-m)o.x=W+m; else if(o.x>W+m)o.x=-m; if(o.y<-m)o.y=H+m; else if(o.y>H+m)o.y=-m;
      var pulse=reduce?1:(.72+.28*Math.sin(t*.0018+o.ph)),spr=sprite(o.col);
      ctx.globalAlpha=o.al*pulse; ctx.drawImage(spr,o.x-m,o.y-m,m*2,m*2);
      ctx.globalAlpha=Math.min(1,o.al*pulse+.15); ctx.fillStyle=rgba(o.col,1); ctx.beginPath(); ctx.arc(o.x,o.y,o.r*.5,0,7); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";
    if(!reduce) raf=requestAnimationFrame(draw);
  }
  var rt=null;
  window.addEventListener("resize",function(){ clearTimeout(rt); rt=setTimeout(function(){ resize(); if(reduce) draw(0); },180); });
  resize(); if(reduce) draw(0); else raf=requestAnimationFrame(draw);
})();

/* ================= CONFETTI ================= */
var Confetti=(function(){
  var cv=null,ctx=null,DPR=1,W=0,H=0,parts=[],raf=null;
  var reduce=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var COL=["#19e3ff","#ff2bd6","#ff3db0","#a64bff","#3b6bff","#2bf0c0","#ffd23b","#ffffff"];
  function ensure(){
    if(cv) return;
    cv=document.createElement("canvas"); cv.id="confetti";
    cv.style.cssText="position:fixed;inset:0;z-index:60;pointer-events:none";
    document.body.appendChild(cv);
    ctx=cv.getContext("2d"); resize();
    window.addEventListener("resize",resize);
  }
  function resize(){ if(!cv||!ctx) return; DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight; cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+"px"; cv.style.height=H+"px"; ctx.setTransform(DPR,0,0,DPR,0,0); }
  function spawn(){
    var n=reduce?46:170;
    for(var i=0;i<n;i++){
      var fromTop=Math.random()<.55;
      var x=fromTop?Math.random()*W:(W/2 + (Math.random()-.5)*120);
      var y=fromTop?-20-Math.random()*H*.3:(H*.42);
      var ang=fromTop?(Math.PI/2 + (Math.random()-.5)*0.8):(Math.random()*Math.PI*2);
      var spd=fromTop?(2+Math.random()*3):(6+Math.random()*9);
      parts.push({x:x,y:y,vx:Math.cos(ang)*spd*(fromTop?0.4:1),vy:(fromTop?spd:Math.sin(ang)*spd)-(fromTop?0:4),
        g:0.12+Math.random()*0.08, w:6+Math.random()*7, h:9+Math.random()*9,
        rot:Math.random()*6.28, vr:(Math.random()-.5)*0.4, col:COL[(Math.random()*COL.length)|0],
        fl:Math.random()*6.28, life:0, max:150+Math.random()*90, streamer:Math.random()<.25});
    }
  }
  function tick(){
    ctx.clearRect(0,0,W,H);
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i]; p.vy+=p.g; p.fl+=0.15; p.x+=p.vx+Math.sin(p.fl)*0.8; p.y+=p.vy; p.rot+=p.vr; p.life++;
      var a=p.life>p.max-40?Math.max(0,(p.max-p.life)/40):1;
      ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.col;
      var w=p.streamer?p.w*0.5:p.w, h=p.streamer?p.h*2:p.h;
      ctx.fillRect(-w/2,-h/2,w,h); ctx.restore();
      if(p.y>H+40 || p.life>p.max) parts.splice(i,1);
    }
    if(parts.length) raf=requestAnimationFrame(tick); else { raf=null; if(ctx) ctx.clearRect(0,0,W,H); }
  }
  function launch(){ ensure(); if(!ctx) return; spawn(); if(!raf) raf=requestAnimationFrame(tick); }
  return { launch:launch };
})();

  /* ----- storage ----- */
  function load(){ try{ var r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){} return null; }
  function save(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} }
  function logEvent(type,payload){ state.events.push({id:uid(),type:type,payload:payload||{},at:Date.now()}); if(state.events.length>800) state.events.splice(0,state.events.length-800); }

  /* ----- helpers ----- */
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function normUrl(u){ u=(u||"").trim(); if(!u) return ""; if(!/^https?:\/\//i.test(u)) u="https://"+u; return u; }
  function fmtDate(ts){ try{ return new Intl.DateTimeFormat("ru-RU",{day:"numeric",month:"long"}).format(new Date(ts)); }catch(e){ return ""; } }
  function daysBetween(a,b){ return Math.max(0,Math.round((b-a)/86400000)); }
  function plural(n,one,few,many){ var m=Math.abs(n)%100,m1=m%10; if(m>10&&m<20) return many; if(m1>1&&m1<5) return few; if(m1===1) return one; return many; }
  function findItem(id){ for(var i=0;i<state.items.length;i++){ if(state.items[i].id===id) return state.items[i]; } return null; }
  function findIdx(id){ for(var i=0;i<state.items.length;i++){ if(state.items[i].id===id) return i; } return -1; }

  /* ----- per-item history ----- */
  function pushHistory(item,type){ if(!item.history) item.history=[]; item.history.push({type:type,at:Date.now()}); logEvent(type,{itemId:item.id,title:item.title}); }
  function itemCounts(item){
    var c={created:0,changedMind:0,purchased:0,returned:0,edited:0};
    (item.history||[]).forEach(function(h){
      if(h.type==="changed_mind")c.changedMind++; else if(h.type==="purchased")c.purchased++;
      else if(h.type==="back_to_want")c.returned++; else if(h.type==="edited")c.edited++; else if(h.type==="created")c.created++;
    });
    return c;
  }

        history:[{type:"created",at:now-3*d},{type:"changed_mind",at:now-12*h}]},
      {id:uid(),title:"Футбольный мяч",link:"",photo:null,icon:"⚽",note:"",favorite:false,status:"bought",createdAt:now-9*d,updatedAt:now-4*d,boughtAt:now-4*d,
        history:[{type:"created",at:now-9*d},{type:"purchased",at:now-6*d},{type:"back_to_want",at:now-5*d},{type:"purchased",at:now-4*d}]}
    ], events:[] };
  }

  /* ----- normalize/migrate ----- */
  function normalize(s){
    if(!s.items) s.items=[]; if(!s.events) s.events=[];
    s.items.forEach(function(it){
      if(typeof it.favorite!=="boolean") it.favorite=false;
      if(it.note==null) it.note="";
      if(!Array.isArray(it.history)){
        it.history=[{type:"created",at:it.createdAt||Date.now()}];
        if(it.boughtAt) it.history.push({type:"purchased",at:it.boughtAt});
      }
    });
    s.version=2; return s;
  }

  /* ----- server / API layer ----- */
  var SERVER=(location.protocol==="http:"||location.protocol==="https:");
  var demo=true;
  var API={ base:"api/",
    get:function(p){ return fetch(API.base+p,{headers:{"Accept":"application/json"}}).then(function(r){ if(!r.ok) throw new Error("http "+r.status); return r.json(); }); },
    post:function(p,b){ return fetch(API.base+p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){ if(!r.ok) throw new Error("http "+r.status); return r.json(); }); }
  };
  function commit(action){ if(demo){ save(); return; } API.post("action.php",action).catch(function(){ toast("Нет связи с сервером — изменение не сохранено"); }); }
  function undoCommit(snap,undoType){ if(demo){ save(); return; } var it=snap.data; API.post("action.php",{type:"undo",itemId:it.id,data:{undoType:undoType,status:it.status,favorite:!!it.favorite,boughtAt:it.boughtAt||null,deleted:false}}).catch(function(){}); }
  function track(type,itemId,data){ if(demo) return; API.post("action.php",{type:type,itemId:itemId||null,data:data||null}).catch(function(){}); }

  /* ----- state ----- */
  var state={items:[],events:[],user:null};
  var currentTab="want", editingId=null, formPhoto=null;
  var pendingPurchaseId=null, detailId=null, undoFn=null;

  /* ----- DOM ----- */
  var body=document.body;

  var appsEl=document.getElementById("apps"), listEl=document.getElementById("list"), tabsEl=document.getElementById("tabs");

  var EMPTY={
    want:{h:"Пока пусто",p:"Нажми «Хочу!» внизу и добавь своё первое желание."},

  };
  var HL={
    created:{t:"Добавлено",e:"➕"}, changed_mind:{t:"Передумал",e:"🤔"}, purchased:{t:"Куплено",e:"🎉"},

  };

  /* ----- haptics / sound ----- */
  function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }
  var actx=null;
  function chime(){
    try{
      var AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
      actx=actx||new AC(); if(actx.state==="suspended") actx.resume();
      var notes=[523.25,659.25,783.99,1046.5];
      for(var i=0;i<notes.length;i++){
        var o=actx.createOscillator(),g=actx.createGain(),tt=actx.currentTime+i*0.09;
        o.type="triangle"; o.frequency.value=notes[i];
        g.gain.setValueAtTime(0,tt); g.gain.linearRampToValueAtTime(0.11,tt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.5);
        o.connect(g); g.connect(actx.destination); o.start(tt); o.stop(tt+0.55);
      }
    }catch(e){}
  }

  /* ----- home ----- */
  function renderHome(){
    appsEl.innerHTML=MODULES.map(function(m){
      var soon=m.status!=="active";
      return '<button class="tile'+(soon?' soon':' active')+(m.wide?' wide':'')+'" style="--c:'+m.color+'" data-mod="'+m.id+'">'
        +(soon?'<span class="lock">'+IC.lock+'</span>':'<span class="ring"></span>')
        +'<span class="ic">'+m.icon+'</span>'
        +'<span class="txt"><span class="nm">'+esc(m.name)+'</span><span class="st">'+(soon?'Скоро':'Открыть')+'</span></span>'
        +'</button>';
    }).join("");
  }

  function switchView(v){ body.setAttribute("data-view",v); homeView.classList.toggle("active",v==="home"); wlView.classList.toggle("active",v==="wishlist"); window.scrollTo(0,0); updateHud(); }
  function openModule(id){ var m=null; for(var i=0;i<MODULES.length;i++){ if(MODULES[i].id===id){ m=MODULES[i]; break; } } if(!m) return; if(m.status==="active"&&id==="wishlist"){ track("opened_module",null,{module:id}); switchView("wishlist"); render(); } else toast(m.name+": скоро!"); }

  /* ----- counts & hud ----- */
  function counts(){ var c={want:0,thinking:0,bought:0}; state.items.forEach(function(i){ if(c[i.status]!=null) c[i.status]++; }); return c; }
  function updateHud(){
    var c=counts(),total=c.want+c.thinking+c.bought,v=body.getAttribute("data-view");
    if(v==="wishlist"){ hudL.innerHTML='хочу: <b>'+c.want+'</b>'; hudCnum.textContent=total; hudClbl.textContent="желаний"; hudRnum.textContent=c.bought; hudRlbl.textContent="куплено"; }
    else{ hudL.innerHTML='RobTop · <b>beta</b>'; hudCnum.textContent=MODULES.length; hudClbl.textContent="приложений"; hudRnum.textContent=total; hudRlbl.textContent="желаний"; }
  }

  /* ----- card render ----- */
  function cardImage(item){
    if(item.photo) return '<div class="card-img" style="background-image:url(\''+item.photo+'\')"></div>';
    var inner=item.icon?'<span class="ph-emoji">'+item.icon+'</span>':'<span class="ph-cherry">'+IC.cherry+'</span>';
    return '<div class="card-img placeholder">'+inner+'</div>';
  }
  function actionsFor(item){
    var id=item.id;
    if(item.status==="want") return '<button class="btn btn-bought" data-action="bought" data-id="'+id+'">'+IC.check+' Куплено</button><button class="btn btn-think" data-action="thinking" data-id="'+id+'">'+IC.think+' Передумал</button>';
    if(item.status==="thinking") return '<button class="btn btn-want" data-action="want" data-id="'+id+'">'+IC.heart+' Хочу!</button><button class="btn btn-bought" data-action="bought" data-id="'+id+'">'+IC.check+' Куплено</button>';
    return '<button class="btn btn-ghost" data-action="want" data-id="'+id+'">'+IC.back2+' Снова хочу</button>';
  }
  function cardHTML(item){
    var co=itemCounts(item),chips="";
    if(co.changedMind>0) chips+='<span class="chip mind">'+IC.think+' передумал ×'+co.changedMind+'</span>';
    if(co.purchased>0) chips+='<span class="chip buy">'+IC.check+' куплено ×'+co.purchased+'</span>';
    if(item.status==="bought"&&item.boughtAt){ var dd=daysBetween(item.createdAt,item.boughtAt); chips+='<span class="chip time">'+IC.clock+' за '+dd+' '+plural(dd,"день","дня","дней")+'</span>'; }
    var chipsHTML=chips?'<div class="chips">'+chips+'</div>':"";
    var notePrev=item.note?'<div class="note-prev">'+esc(item.note)+'</div>':"";
    var link=normUrl(item.link);
    var linkHTML=link?'<a class="card-link" href="'+esc(link)+'" target="_blank" rel="noopener">'+IC.link+' Открыть ссылку</a>':"";
    var boughtBadge=item.status==="bought"?'<div class="bought-badge">'+IC.badge+' Куплено</div>':"";
    return '<article class="card'+(item.status==="bought"?" shine":"")+'" data-id="'+item.id+'">'
      +cardImage(item)+boughtBadge
      +'<button class="fav-btn'+(item.favorite?" on":"")+'" data-action="fav" data-id="'+item.id+'" aria-label="Очень хочу">'+(item.favorite?IC.star:IC.starO)+'</button>'
      +'<div class="card-body"><h3 class="card-title">'+esc(item.title)+'</h3>'+chipsHTML+notePrev+linkHTML
      +'<div class="card-actions">'+actionsFor(item)+'</div></div></article>';
  }
  function render(){
    var c=counts();
    ["want","thinking","bought"].forEach(function(k){ var b=tabsEl.querySelector('[data-count="'+k+'"]'); if(b) b.textContent=c[k]; });
    Array.prototype.forEach.call(tabsEl.querySelectorAll(".tab"),function(t){ t.classList.toggle("active",t.getAttribute("data-tab")===currentTab); });
    var items=state.items.filter(function(i){ return i.status===currentTab; });
    if(currentTab==="want") items.sort(function(a,b){ if((b.favorite?1:0)!==(a.favorite?1:0)) return (b.favorite?1:0)-(a.favorite?1:0); return b.updatedAt-a.updatedAt; });
    else if(currentTab==="bought") items.sort(function(a,b){ return (b.boughtAt||b.updatedAt)-(a.boughtAt||a.updatedAt); });
    else items.sort(function(a,b){ return b.updatedAt-a.updatedAt; });
    if(!items.length){ var e=EMPTY[currentTab]; listEl.innerHTML='<div class="empty"><div class="empty-ic">'+IC.cherry+'</div><h3>'+e.h+'</h3><p>'+e.p+'</p></div>'; }
    else listEl.innerHTML=items.map(cardHTML).join("");
    updateHud();
  }
  function setTab(t){ currentTab=t; wlView.setAttribute("data-tab",t); render(); }

  /* ----- actions ----- */
  function handleAction(action,id){
    if(action==="fav") return toggleFav(id);
    if(action==="bought") return confirmPurchase(id);
    if(action==="thinking") return moveItem(id,"thinking");
    if(action==="want") return moveItem(id,"want");
    if(action==="edit") return openEdit(id);
    if(action==="delete") return deleteItem(id);
    if(action==="detail") return openDetail(id);
  }
  function toggleFav(id){ var it=findItem(id); if(!it) return; it.favorite=!it.favorite; it.updatedAt=Date.now(); commit({type:"favorite",itemId:id,data:{on:it.favorite}}); render(); if(detailId===id) renderDetail(id); buzz(8); }

  function snapshot(item){ return {idx:findIdx(item.id),data:JSON.parse(JSON.stringify(item))}; }
  function restore(s){ var i=findIdx(s.data.id); if(i>=0) state.items[i]=s.data; else state.items.splice(Math.min(s.idx,state.items.length),0,s.data); if(demo) save(); render(); }

  function moveItem(id,to){
    var item=findItem(id); if(!item||item.status===to) return;
    var snap=snapshot(item),from=item.status;
    item.status=to; item.updatedAt=Date.now();
    if(from==="bought"&&to!=="bought") item.boughtAt=null;
    var act=(to==="thinking"?"changed_mind":"back_to_want");
    pushHistory(item, act);
    commit({type:act,itemId:id}); if(detailId===id) closeDetail(); render();
    var msg=to==="thinking"?"Перенесено в «Думаю»":"Снова в «Хочу»!";
    undoFn=function(){ restore(snap); undoCommit(snap,act); }; toast(msg,"Отменить",undoFn); buzz(8);
  }
  function deleteItem(id){
    var idx=findIdx(id); if(idx<0) return; var item=state.items[idx];
    var snap={idx:idx,data:JSON.parse(JSON.stringify(item))};
    state.items.splice(idx,1);
    commit({type:"delete",itemId:id}); if(detailId===id) closeDetail(); render();
    undoFn=function(){ restore(snap); undoCommit(snap,"deleted"); }; toast("Желание удалено","Отменить",undoFn); buzz(12);
  }

  /* ----- purchase (double confirm + celebration) ----- */
  function confirmPurchase(id){
    var item=findItem(id); if(!item) return; pendingPurchaseId=id;
    var pb=document.getElementById("purchaseBody");
    var media=item.photo?'<div style="width:64px;height:64px;border-radius:16px;background-size:cover;background-position:center;margin:0 auto 6px;background-image:url(\''+item.photo+'\')"></div>':'<div class="pc-emoji">'+(item.icon||"🎉")+'</div>';
    pb.innerHTML=media
      +'<div class="pc-q">Точно купили?</div>'
      +'<div class="pc-name">'+esc(item.title)+'</div>'
      +'<div class="sheet-actions"><button class="btn btn-cancel" id="pcNo">Ещё нет</button><button class="btn btn-celebrate" id="pcYes">Да, купили! 🎉</button></div>';
    document.getElementById("purchaseOverlay").classList.add("show");
    var armed=false,armT=null,yes=document.getElementById("pcYes"),q=pb.querySelector(".pc-q");
    document.getElementById("pcNo").onclick=closePurchase;
    yes.onclick=function(){
      if(!armed){ armed=true; yes.textContent="Точно? Нажми ещё раз ✅"; yes.classList.add("armed"); q.textContent="Подтверди покупку ещё раз"; buzz(12);
        clearTimeout(armT); armT=setTimeout(function(){ armed=false; yes.textContent="Да, купили! 🎉"; yes.classList.remove("armed"); q.textContent="Точно купили?"; },4000); return; }
      clearTimeout(armT); doPurchase(pendingPurchaseId);
    };
  }
  function closePurchase(){ document.getElementById("purchaseOverlay").classList.remove("show"); pendingPurchaseId=null; }
  function doPurchase(id){
    var item=findItem(id); if(!item) return;
    item.status="bought"; item.boughtAt=Date.now(); item.updatedAt=Date.now();
    pushHistory(item,"purchased");
    commit({type:"purchased",itemId:id}); closePurchase(); closeDetail(); setTab("bought");
    Confetti.launch(); chime(); buzz([25,40,25,40,70]);
    toast("Поздравляю! Желание исполнилось 🎉");
  }

  }
  function openDetail(id){ detailId=id; renderDetail(id); document.getElementById("detailOverlay").classList.add("show"); track("viewed_detail",id,null); }
  function closeDetail(){ document.getElementById("detailOverlay").classList.remove("show"); detailId=null; }

  /* ----- stats sheet ----- */
  function aggregate(){
    var t={total:state.items.length,boughtNow:0,purchases:0,changedMind:0,favorites:0,sumDays:0,nDays:0,fickle:null};
    state.items.forEach(function(it){
      var c=itemCounts(it);
      if(it.status==="bought") t.boughtNow++;
      t.purchases+=c.purchased; t.changedMind+=c.changedMind; if(it.favorite) t.favorites++;
      if(it.status==="bought"&&it.boughtAt){ t.sumDays+=daysBetween(it.createdAt,it.boughtAt); t.nDays++; }
      if(c.changedMind>0&&(!t.fickle||c.changedMind>t.fickle.n)) t.fickle={name:it.title,n:c.changedMind};
    });
    t.avgDays=t.nDays?Math.round(t.sumDays/t.nDays):null; return t;
  }
  function openStats(){
    track("viewed_stats",null,null);
    var a=aggregate();
    var html='<div class="sgrid">'
      +'<div class="scard c1"><div class="n">'+a.total+'</div><div class="l">всего желаний</div></div>'
      +'<div class="scard c2"><div class="n">'+a.boughtNow+'</div><div class="l">исполнено сейчас</div></div>'
      +'<div class="scard c2"><div class="n">'+a.purchases+'</div><div class="l">всего покупок</div></div>'
      +'<div class="scard c3"><div class="n">'+a.changedMind+'</div><div class="l">раз передумал</div></div>'
      +'<div class="scard c4"><div class="n">'+a.favorites+'</div><div class="l">★ очень хочу</div></div>'
      +'<div class="scard c2"><div class="n">'+(a.avgDays==null?"—":a.avgDays)+'</div><div class="l">ср. дней до покупки</div></div>'
      +'</div>';
    if(a.fickle) html+='<div class="sline">Самое непостоянное желание: <b>'+esc(a.fickle.name)+'</b> (передумал ×'+a.fickle.n+')</div>';
    document.getElementById("statsBody").innerHTML=html;
    document.getElementById("statsOverlay").classList.add("show");
  }

  /* ----- add/edit sheet ----- */
  var overlay=document.getElementById("overlay"),photoPick=document.getElementById("photoPick"),ppreview=document.getElementById("ppreview"),
      photoInput=document.getElementById("photoInput"),titleInput=document.getElementById("titleInput"),linkInput=document.getElementById("linkInput"),
      noteInput=document.getElementById("noteInput"),sheetTitle=document.getElementById("sheetTitle");
  function showPreview(src){ if(src){ photoPick.classList.add("has-photo"); ppreview.style.backgroundImage="url('"+src+"')"; } else { photoPick.classList.remove("has-photo"); ppreview.style.backgroundImage=""; } }
  function setFormPhoto(d){ formPhoto=d||null; showPreview(formPhoto); }
  function uploadPhoto(dataUrl){
    photoPick.classList.add("uploading");
    API.post("upload.php",{dataUrl:dataUrl,kind:"wishlist"}).then(function(res){ photoPick.classList.remove("uploading"); if(res&&res.path){ formPhoto=res.path; } else { formPhoto=null; toast("Не удалось загрузить фото"); } }).catch(function(){ photoPick.classList.remove("uploading"); formPhoto=null; toast("Не удалось загрузить фото (нет связи)"); });
  }
  function openAdd(){ editingId=null; sheetTitle.textContent="Новое желание"; titleInput.value=""; linkInput.value=""; noteInput.value=""; setFormPhoto(null); overlay.classList.add("show"); setTimeout(function(){ titleInput.focus(); },250); }
  function openEdit(id){ var it=findItem(id); if(!it) return; closeDetail(); editingId=id; sheetTitle.textContent="Изменить желание"; titleInput.value=it.title||""; linkInput.value=it.link||""; noteInput.value=it.note||""; setFormPhoto(it.photo||null); overlay.classList.add("show"); }
  function closeSheet(){ overlay.classList.remove("show"); }
  function saveSheet(){
    var title=titleInput.value.trim();
    if(!title){ titleInput.focus(); titleInput.style.borderColor="#ff3db0"; toast("Напиши название желания"); return; }
    var link=linkInput.value.trim(),note=noteInput.value.trim();
    if(editingId){
      var it=findItem(editingId);
      if(it){ it.title=title; it.link=link; it.note=note; it.photo=formPhoto; if(formPhoto) it.icon=null; it.updatedAt=Date.now(); pushHistory(it,"edited"); commit({type:"edited",itemId:editingId,data:{title:title,note:note,link:link,photo:formPhoto,icon:it.icon}}); }
      render(); closeSheet(); toast("Сохранено");
    }else if(demo){
      var now=Date.now(),neu={id:uid(),title:title,link:link,note:note,photo:formPhoto,icon:null,favorite:false,status:"want",createdAt:now,updatedAt:now,boughtAt:null,history:[{type:"created",at:now}]};
      state.items.push(neu); logEvent("created",{itemId:neu.id,title:title});
      save(); closeSheet(); setTab("want"); toast("Желание добавлено! 🍒");
    }else{
      closeSheet();
      API.post("action.php",{type:"create",data:{title:title,note:note,link:link,photo:formPhoto,icon:null}})
        .then(function(res){ if(res&&res.item){ state.items.push(res.item); setTab("want"); toast("Желание добавлено! 🍒"); } else toast("Не удалось добавить"); })
        .catch(function(){ toast("Не удалось добавить (нет связи)"); });
    }
  }
  function handleFile(file){
    if(!file) return; var reader=new FileReader();
    reader.onload=function(ev){ var img=new Image();
      img.onload=function(){ var max=900,w=img.width,h=img.height; if(w>h&&w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w&&h>max){ w=Math.round(w*max/h); h=max; }
        var dataUrl; try{ var cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h); dataUrl=cv.toDataURL("image/jpeg",0.82); }catch(e){ dataUrl=ev.target.result; }
        showPreview(dataUrl); if(demo){ formPhoto=dataUrl; } else { uploadPhoto(dataUrl); } };
      img.onerror=function(){ var du=ev.target.result; showPreview(du); if(demo){ formPhoto=du; } else { uploadPhoto(du); } }; img.src=ev.target.result; };
    reader.readAsDataURL(file);
  }

  /* ----- toast ----- */
  var toastEl=document.getElementById("toast"),toastT=null;
  function hideToast(){ toastEl.classList.remove("show"); }
  function toast(msg,actLabel,actFn){
    toastEl.innerHTML='<span>'+esc(msg)+'</span>'+(actLabel?'<button class="toast-act" type="button">'+esc(actLabel)+'</button>':"");
    toastEl.classList.toggle("has-act",!!actLabel); toastEl.classList.add("show");
    if(actLabel){ var b=toastEl.querySelector(".toast-act"); b.onclick=function(){ try{ if(actFn) actFn(); }catch(e){} hideToast(); }; }
    clearTimeout(toastT); toastT=setTimeout(hideToast, actLabel?6000:2200);
  }

  /* ----- swipe-down / tap-grip to dismiss sheets ----- */
  function enableDrag(sheet, close){
    var startY=0, dy=0, dragging=false;
    sheet.addEventListener("touchstart",function(e){ if(sheet.scrollTop>2){ dragging=false; return; } startY=e.touches[0].clientY; dy=0; dragging=true; sheet.style.transition="none"; },{passive:true});
    sheet.addEventListener("touchmove",function(e){ if(!dragging) return; dy=e.touches[0].clientY-startY; if(dy>0){ if(e.cancelable) e.preventDefault(); sheet.style.transform="translateY("+dy+"px)"; } },{passive:false});
    sheet.addEventListener("touchend",function(){ if(!dragging) return; dragging=false; sheet.style.transition="transform .22s ease"; if(dy>120){ sheet.style.transform="translateY(100%)"; setTimeout(function(){ sheet.style.transform=""; sheet.style.transition=""; close(); },200); } else { sheet.style.transform=""; setTimeout(function(){ sheet.style.transition=""; },220); } });
  }

  /* ----- events ----- */
  appsEl.addEventListener("click",function(e){ var t=e.target.closest("[data-mod]"); if(t) openModule(t.getAttribute("data-mod")); });
  document.getElementById("backBtn").addEventListener("click",function(){ switchView("home"); });
  document.getElementById("statsBtn").addEventListener("click",openStats);
  tabsEl.addEventListener("click",function(e){ var t=e.target.closest(".tab"); if(t) setTab(t.getAttribute("data-tab")); });
  listEl.addEventListener("click",function(e){
    var btn=e.target.closest("[data-action]");
    if(btn){ handleAction(btn.getAttribute("data-action"),btn.getAttribute("data-id")); return; }
    if(e.target.closest("a")) return;
    var card=e.target.closest(".card"); if(card) openDetail(card.getAttribute("data-id"));
  });
  document.getElementById("detailBody").addEventListener("click",function(e){ var btn=e.target.closest("[data-action]"); if(btn) handleAction(btn.getAttribute("data-action"),btn.getAttribute("data-id")); });
  document.getElementById("fab").addEventListener("click",openAdd);
  document.getElementById("saveBtn").addEventListener("click",saveSheet);
  document.getElementById("cancelBtn").addEventListener("click",closeSheet);
  document.getElementById("statsClose").addEventListener("click",function(){ document.getElementById("statsOverlay").classList.remove("show"); });
  overlay.addEventListener("click",function(e){ if(e.target===overlay) closeSheet(); });
  document.getElementById("detailOverlay").addEventListener("click",function(e){ if(e.target.id==="detailOverlay") closeDetail(); });
  document.getElementById("purchaseOverlay").addEventListener("click",function(e){ if(e.target.id==="purchaseOverlay") closePurchase(); });
  document.getElementById("statsOverlay").addEventListener("click",function(e){ if(e.target.id==="statsOverlay") e.currentTarget.classList.remove("show"); });
  photoPick.addEventListener("click",function(){ photoInput.click(); });
  photoInput.addEventListener("change",function(e){ handleFile(e.target.files[0]); photoInput.value=""; });
  titleInput.addEventListener("input",function(){ titleInput.style.borderColor=""; });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape"){ closeSheet(); closeDetail(); closePurchase(); document.getElementById("statsOverlay").classList.remove("show"); } });
  [[overlay,closeSheet],[document.getElementById("detailOverlay"),closeDetail],[document.getElementById("purchaseOverlay"),closePurchase],[document.getElementById("statsOverlay"),function(){ document.getElementById("statsOverlay").classList.remove("show"); }]].forEach(function(p){ var ov=p[0],close=p[1],sheet=ov&&ov.querySelector(".sheet"); if(!sheet) return; var grip=sheet.querySelector(".grip"); if(grip) grip.addEventListener("click",close); enableDrag(sheet,close); });

  /* ----- go ----- */
  function demoBoot(msg){ demo=true; document.body.classList.add("demo"); var s=normalize(load()||seed()); state.items=s.items; state.events=s.events||[]; state.user={name:"Артём",role:"child"}; save(); if(body.getAttribute("data-view")==="wishlist") render(); if(msg) toast(msg); }
  function boot(){
    renderHome(); updateHud();
    if(SERVER){
      API.get("state.php").then(function(res){ demo=false; document.body.classList.remove("demo"); state.items=(res&&res.items)||[]; state.events=[]; state.user=(res&&res.user)||null; updateHud(); if(body.getAttribute("data-view")==="wishlist") render(); track("opened_app",null,null); })
        .catch(function(){ demoBoot("Демо-режим: сервер недоступен"); });
    } else { demoBoot(); }
  }
  boot();
})();
</script>
</body>
</html>
