<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07061a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RobTop">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="media/icon/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="media/icon/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="media/icon/icon.svg">
<title>RobTop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rubik:wght@400;500;600;700;800&display=swap&subset=cyrillic" rel="stylesheet">
<link rel="stylesheet" href="core/ui.css">
</head>
<body data-view="home">
<canvas id="bg"></canvas>

<div id="root">
  <!-- ============ HOME ============ -->
  <section id="home" class="view active">
    <div class="hometop">
      <h1 class="brand">Rob<b>Top</b></h1>
      <button class="gear" id="gearBtn" aria-label="Управление приложениями">⚙</button>
      <div class="tagline">Выбери приложение <span class="spark">◆</span></div>
    </div>
    <div class="apps" id="apps"></div>
  </section>

  <!-- ============ MODULE MOUNT POINT ============ -->
  <section id="module-view" class="view"></section>
</div>

<!-- HUD -->
<div class="hud" id="hud">
  <div class="hud-l" id="hudL">RobTop</div>
  <div class="hud-c"><div class="big" id="hudCnum">0</div><div class="lbl" id="hudClbl">приложений</div></div>
  <div class="hud-r"><div class="big" id="hudRnum">0</div><div class="lbl" id="hudRlbl">доступно</div></div>
</div>

<!-- FAB (общий, управляется модулями через sdk.ui.fab) -->
<button class="fab" id="fab" aria-label="Действие"></button>

<!-- Магазин приложений (админ) -->
<div class="overlay" id="storeOverlay">
  <div class="sheet store" role="dialog" aria-modal="true" aria-label="Приложения">
    <div class="grip"></div>
    <div id="storeBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="demo-badge" id="demoBadge">демо</div>

<!-- Индикатор версии (слева внизу). Меняй число при КАЖДОМ обновлении — видно, залилась ли новая версия на сайт. -->
<div class="appver" id="appver">v2026.06.05.1</div>

<script src="core/bg.js"></script>
<script src="core/sdk.js"></script>
<script src="core/loader.js"></script>
<script src="core/shell.js"></script>
</body>
</html>
