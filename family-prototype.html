<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RobTop — Family accounts prototype</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--cyan:#19e3ff;--pink:#ff3db0;--purple:#a64bff;--mint:#38e8a0;--gold:#ffd23b;--red:#ff4d6d;--ink:#eaf2ff;--muted:#93a6cf}
  html,body{margin:0;min-height:100%}
  body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#05050f;
    background-image:radial-gradient(900px 600px at 12% 6%,rgba(166,75,255,.18),transparent 60%),
      radial-gradient(900px 700px at 90% 18%,rgba(25,227,255,.13),transparent 60%),
      radial-gradient(1000px 800px at 50% 110%,rgba(255,43,214,.15),transparent 60%),
      linear-gradient(180deg,#070617,#05040f 60%,#07041a);min-height:100vh}
  a{color:var(--cyan)}
  /* header */
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
  .head h1{font-family:'Russo One','Rubik',sans-serif;font-size:19px;margin:0;color:#fff;text-shadow:0 0 12px rgba(25,227,255,.6)}
  .head h1 b{color:var(--pink);font-weight:400}
  .head .sub{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px}
  .tools{display:flex;align-items:center;gap:10px}
  .demo{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);
    background:rgba(255,210,59,.14);border:1px solid rgba(255,210,59,.45);padding:4px 9px;border-radius:999px}
  .lang{display:flex;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{border:none;background:none;color:#cfe0ff;font-weight:800;font-size:12px;padding:5px 10px;border-radius:999px;cursor:pointer}
  .lang button.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  /* layout */
  .layout{display:flex;gap:18px;align-items:flex-start;padding:18px 20px 50px;max-width:1100px;margin:0 auto}
  .side{flex:0 0 250px;position:sticky;top:14px}
  .side .grp{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:14px 6px 6px}
  .scn{display:block;width:100%;text-align:left;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.035);
    color:#dbe6ff;font-family:inherit;font-weight:700;font-size:13px;padding:9px 11px;border-radius:11px;margin:5px 0;cursor:pointer;transition:.15s}
  .scn:hover{border-color:rgba(25,227,255,.5)}
  .scn.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-color:transparent}
  .stagewrap{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center}
  /* breadcrumb steps */
  .crumbs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
  .crumb{font-size:11px;font-weight:700;color:#9fb0d6;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    padding:4px 9px;border-radius:999px;cursor:pointer}
  .crumb.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-color:transparent}
  .crumb.done{color:#bdeeff;border-color:rgba(25,227,255,.4)}
  /* phone */
  .phone{width:390px;max-width:94vw;border-radius:40px;padding:12px;background:linear-gradient(160deg,#15132e,#0a0920);
    border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 50px -16px var(--cyan)}
  .screen{position:relative;height:680px;max-height:74vh;overflow:auto;border-radius:30px;padding:18px 16px 22px;
    background:radial-gradient(700px 480px at 20% 0%,rgba(166,75,255,.12),transparent 60%),linear-gradient(180deg,#0a0920,#0b0822)}
  .screen::-webkit-scrollbar{width:0}
  .scr-anim{animation:sin .26s ease both}
  @keyframes sin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .nub{width:46px;height:5px;border-radius:3px;background:rgba(255,255,255,.2);margin:0 auto 14px}
  .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
  .scr{display:flex;flex-direction:column;align-items:stretch}
  /* ЗАЩИТА ОТ СХЛОПЫВАНИЯ: ни один блок экрана не может сжаться по высоте.
     Без этого при контенте выше фикс-высоты .screen flex-shrink давил текстовые блоки в «блин»:
     кнопки (min-height) сопротивлялись, а заметки сжимались до полоски-эллипса, текст вытекал поверх кнопок. */
  .scr > *{flex-shrink:0}
  .scr > .info{align-self:flex-start}
  .scr h2{font-family:'Russo One','Rubik',sans-serif;font-weight:400;font-size:21px;margin:0 0 4px;color:#fff;line-height:1.1}
  .scr p.lead{color:var(--muted);font-size:13px;font-weight:600;margin:0 0 14px;line-height:1.5}
  .scr .tag,.scr h2,.scr p.lead,.scr .note,.scr .big,.scr label{width:100%}
  /* on-screen hint + safety */
  .hint{margin-top:12px;font-size:12px;font-weight:700;color:#bdeeff;background:rgba(25,227,255,.08);border:1px dashed rgba(25,227,255,.4);
    border-radius:11px;padding:9px 11px;line-height:1.45}
  .safebar{margin:8px 0 2px;display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:800;color:#ffd9a6;
    background:rgba(255,170,40,.12);border:1px solid rgba(255,170,40,.45);border-radius:10px;padding:8px 10px}
  .safelist{list-style:none;margin:10px 0 0;padding:0}
  .safelist li{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-radius:12px;margin-top:8px;
    font-size:13px;font-weight:600;line-height:1.45;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
  .safelist li .ic{flex:0 0 auto;font-size:18px;line-height:1.2}
  .safelist li.no{background:rgba(255,77,109,.1);border-color:rgba(255,77,109,.4);color:#ffc2cd}
  .safelist li.yes{background:rgba(43,240,192,.09);border-color:rgba(43,240,192,.4);color:#c7f6e8}
  .safelist li.tell{background:rgba(255,210,59,.1);border-color:rgba(255,210,59,.45);color:#ffe7a6}
  label{display:block;font-size:12px;font-weight:800;color:#cfe0ff;margin:12px 0 5px}
  .field{display:flex;align-items:center;flex-wrap:wrap;gap:8px;border:1.5px solid rgba(255,255,255,.16);border-radius:13px;padding:12px 13px;
    background:rgba(255,255,255,.05);font-size:15px;font-weight:600;color:#e9f1ff;word-break:break-word;min-width:0}
  .field .demoflag{margin-left:auto;font-size:9.5px;font-weight:800;color:var(--gold);background:rgba(255,210,59,.12);
    border:1px solid rgba(255,210,59,.4);padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .linkbox{margin-top:6px;padding:12px 13px;border-radius:13px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.16);
    font-size:12.5px;font-weight:600;color:#cdeeff;word-break:break-all;line-height:1.5}
  .mailcard{margin-top:10px;border-radius:13px;overflow:hidden;border:1px solid rgba(255,255,255,.16)}
  .mailcard .mh{background:linear-gradient(135deg,#241a52,#2f1c6a);padding:9px 12px;font-weight:800;font-size:12px;color:#dfe9ff}
  .mailcard .mb{background:rgba(255,255,255,.05);padding:11px 12px;font-size:13px;font-weight:700;color:#e7eeff;line-height:1.5}
  .mailcard .mb .lk{display:block;margin-top:4px;word-break:break-all;color:#bdeeff;font-weight:600;font-size:11.5px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:50px;border:none;border-radius:25px;cursor:pointer;
    font-family:'Russo One','Rubik',sans-serif;font-size:15px;color:#04212b;margin-top:16px;flex:0 0 auto;
    background:linear-gradient(180deg,#3df0c0,#19c7e0);box-shadow:0 12px 24px -14px var(--cyan)}
  .btn:active{transform:scale(.98)}
  .btn.pink{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff;box-shadow:0 12px 24px -14px var(--pink)}
  .btn.ghost{background:rgba(255,255,255,.06);color:#cfe0ff;border:1.5px solid rgba(255,255,255,.16);box-shadow:none;font-family:inherit;font-weight:800}
  .btn.danger{background:rgba(255,77,109,.14);color:#ffb3c0;border:1.5px solid rgba(255,77,109,.5);box-shadow:none;font-family:inherit;font-weight:800}
  .btn.sm{height:38px;font-size:12.5px;width:auto;padding:0 14px;margin:0;border-radius:20px;font-family:inherit;font-weight:800}
  .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);margin-top:9px}
  .av{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  .av.p{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff}
  .av.g{background:linear-gradient(180deg,#ffd23b,#e0a400)}
  .av.wlthumb{background:linear-gradient(180deg,#2a2350,#171338);border:1px solid rgba(255,255,255,.14);font-size:18px;color:#fff}
  .row .nm{flex:1;min-width:0;font-weight:700;font-size:14px}
  .row .nm small{display:block;color:var(--muted);font-weight:600;font-size:11.5px;margin-top:1px}
  .pill{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;background:rgba(25,227,255,.14);color:#bdeeff;border:1px solid rgba(25,227,255,.4)}
  .pill.g{background:rgba(255,210,59,.14);color:var(--gold);border-color:rgba(255,210,59,.45)}
  .pill.ok{background:rgba(43,240,192,.14);color:var(--mint);border-color:rgba(43,240,192,.45)}
  .pill.warn{background:rgba(255,77,109,.14);color:#ffb3c0;border-color:rgba(255,77,109,.45)}
  /* Callout — full redesign of the old translucent plaque that could collapse into a thin
     ellipse. Now a solid dark card with a colored left accent bar and a leading icon.
     flex:0 0 auto makes it unshrinkable inside the flex column, so it can NEVER collapse;
     width:100% keeps it full-width regardless of content height. */
  .note{position:relative;z-index:1;flex:0 0 auto;width:100%;margin:12px 0 2px;
    padding:11px 13px 11px 14px;border-radius:13px;font-size:12.5px;font-weight:600;line-height:1.55;
    word-break:break-word;color:#e7eeff;background:#0d1430;border:1px solid rgba(255,255,255,.14);
    border-left:4px solid var(--cyan)}
  .note::before{content:"\2139\FE0F";margin-right:7px;font-size:14px}
  .note.info{border-left-color:var(--cyan)}
  .note.info::before{content:"\2139\FE0F"}
  .note.ok{border-left-color:var(--mint)}
  .note.ok::before{content:"\2705"}
  .note.warn{border-left-color:var(--red);background:#190f1b}
  .note.warn::before{content:"\26A0\FE0F"}
  .note.gold{border-left-color:var(--gold)}
  .note.gold::before{content:"\23F3"}
  .note+.btn{margin-top:20px}
  .big{font-family:'Russo One','Rubik',sans-serif;font-size:34px;color:#fff;text-align:center;margin:6px 0}
  .center{text-align:center}
  .muted{color:var(--muted);font-size:12.5px;font-weight:600}
  .sep{height:1px;background:rgba(255,255,255,.1);margin:14px 0}
  .tabs{display:flex;gap:7px;margin:4px 0 12px}
  .tab{flex:1;text-align:center;font-weight:800;font-size:12.5px;color:#cfe0ff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:9px}
  .tab.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-color:transparent}
  .stat{display:flex;gap:9px}
  .stat .box{flex:1;text-align:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:11px 6px}
  .stat .box .n{font-family:'Russo One','Rubik',sans-serif;font-size:22px;color:#fff}
  .stat .box .l{font-size:10.5px;font-weight:700;color:var(--muted);margin-top:3px}
  .bars{display:flex;align-items:flex-end;gap:6px;height:74px;margin-top:10px}
  .bars i{flex:1;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-radius:5px 5px 0 0;opacity:.85}
  /* info chips / tooltip */
  .info{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;border:1px solid rgba(25,227,255,.55);
    color:#bdeeff;font-size:11px;font-weight:800;cursor:pointer;background:rgba(25,227,255,.1);vertical-align:middle}
  .titlebar{display:flex;align-items:center;gap:7px}
  #pop{position:fixed;z-index:50;max-width:240px;background:#0c1330;border:1px solid rgba(25,227,255,.5);color:#dff0ff;
    font-size:12px;font-weight:600;line-height:1.45;padding:10px 12px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.5);display:none}
  /* controls + annotation */
  .controls{display:flex;align-items:center;gap:10px;margin-top:14px}
  .controls button{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#dbe6ff;font-family:inherit;
    font-weight:800;font-size:13px;padding:9px 16px;border-radius:11px;cursor:pointer}
  .controls button:disabled{opacity:.4;cursor:default}
  .controls .pos{font-size:12px;font-weight:700;color:var(--muted);min-width:90px;text-align:center}
  .whats{margin-top:14px;max-width:520px;width:100%;background:rgba(10,12,30,.7);border:1px solid rgba(25,227,255,.3);
    border-radius:14px;padding:13px 15px}
  .whats .h{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:4px}
  .whats .t{font-size:13.5px;font-weight:600;color:#dbe9ff;line-height:1.5}
  .whats .do{margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;font-weight:700;color:#ffe7a6;line-height:1.5}
  .whats .do b{color:#fff}
  .foot{max-width:1100px;margin:0 auto;padding:0 20px 40px;color:var(--muted);font-size:12px}
  @media(max-width:820px){ .layout{flex-direction:column} .side{position:static;flex:1;width:100%;display:flex;flex-wrap:wrap;gap:6px}
    .side .grp{width:100%} .scn{width:auto;margin:0} }
</style>
</head>
<body>
<div class="head">
  <div>
    <h1>Rob<b>Top</b> · Family</h1>
    <div class="sub" id="subt">Clickable accounts prototype</div>
  </div>
  <div class="tools">
    <span class="demo" id="demoBadge">prototype · demo</span>
    <div class="lang" id="lang"></div>
  </div>
</div>

<div class="layout">
  <div class="side" id="side"></div>
  <div class="stagewrap">
    <div class="crumbs" id="crumbs"></div>
    <div class="phone"><div class="screen" id="screen"></div></div>
    <div class="controls">
      <button id="back">‹ <span id="backL">Back</span></button>
      <div class="pos" id="pos">1 / 1</div>
      <button id="next"><span id="nextL">Next</span> ›</button>
    </div>
    <div class="whats">
      <div class="h" id="whatsH">What is happening</div>
      <div class="t" id="whatsT"></div>
      <div class="do" id="whatsDo"></div>
    </div>
  </div>
</div>
<div class="foot" id="foot"></div>
<div id="pop"></div>

<script>
"use strict";

/* ================= i18n strings (EN base, RU, LV draft) ================= */
var S = {

  /* shared */
  "cta.continue":{en:"Continue",ru:"Продолжить",lv:"Turpināt"},

  /* start */
  "start.tag":{en:"Welcome",ru:"Добро пожаловать",lv:"Laipni lūdzam"},
  "start.title":{en:"RobTop Family",ru:"Семья RobTop",lv:"RobTop ģimene"},
  "start.lead":{en:"Parents sign in with email. Children sign in with a nickname. No personal data is stored, only nicknames.",
    ru:"Родители входят по email, дети по никнейму. Личные данные не хранятся, только никнеймы.",
    lv:"Vecāki pieslēdzas ar e-pastu, bērni ar segvārdu. Personas dati netiek glabāti, tikai segvārdi."},

  "tip.nopii":{en:"Children never have an email here. Only a nickname and a password.",
    ru:"У детей здесь нет email. Только никнейм и пароль.",
    lv:"Bērniem šeit nav e-pasta. Tikai segvārds un parole."},

  /* login */
  "login.tag":{en:"Sign in",ru:"Вход",lv:"Pieslēgšanās"},

/* ================= state + render ================= */
var cur = 0, step = 0;

function renderLang(){
  var box = document.getElementById("lang"); box.innerHTML="";
  ["en","ru","lv"].forEach(function(l){
    var b=document.createElement("button"); b.textContent=l.toUpperCase(); if(l===lang) b.className="on";
    b.onclick=function(){ lang=l; renderAll(); }; box.appendChild(b);
  });
}
function renderSide(){
  var side=document.getElementById("side"); side.innerHTML="";
  var groups=["grp.onboarding","grp.safety","grp.family","grp.manage","grp.invites","grp.guardianship","grp.passwords","grp.edge"];
  groups.forEach(function(g){
    var h=document.createElement("div"); h.className="grp"; h.textContent=t(g); side.appendChild(h);
    SCN.forEach(function(s,i){ if(s.grp!==g) return;
      var b=document.createElement("button"); b.className="scn"+(i===cur?" on":""); b.textContent=t("scn."+s.id);
      b.onclick=function(){ cur=i; step=0; renderStage(); renderSide(); }; side.appendChild(b);
    });
  });
}
function renderCrumbs(){
  var c=document.getElementById("crumbs"); c.innerHTML=""; var steps=SCN[cur].steps;
  steps.forEach(function(st,i){
    var b=document.createElement("button"); b.className="crumb"+(i===step?" on":i<step?" done":"");
    b.textContent=(i+1); b.title=t(SCREENS[st[0]]?("scn."+SCN[cur].id):""); b.onclick=function(){ step=i; renderStage(); };
    c.appendChild(b);
  });
}
function scnIndex(id){ for(var i=0;i<SCN.length;i++){ if(SCN[i].id===id) return i; } return -1; }
function renderStage(){
  var sc=SCN[cur].steps[step]; var screenId=sc[0], noteKey=sc[1], doKey=sc[2]||"do.read";
  var el=document.getElementById("screen");
  el.className="screen"; void el.offsetWidth;
  el.innerHTML='<div class="nub"></div><div class="scr scr-anim">'+(SCREENS[screenId]?SCREENS[screenId]():"")+'</div>';
  document.getElementById("pos").textContent=(step+1)+" / "+SCN[cur].steps.length;
  document.getElementById("back").disabled=(step===0);
  document.getElementById("next").disabled=(step===SCN[cur].steps.length-1);
  document.getElementById("whatsT").textContent=t(noteKey);
  document.getElementById("whatsDo").innerHTML='<b>'+t("ui.do")+':</b> '+esc(t(doKey));
  // jump-to-scenario buttons (e.g. "How sign-in works") — handle BEFORE advance
  Array.prototype.forEach.call(el.querySelectorAll("[data-scn]"),function(b){ b.addEventListener("click",function(e){
    e.stopPropagation(); var idx=scnIndex(b.getAttribute("data-scn")); if(idx>=0){ cur=idx; step=0; renderStage(); renderSide(); }
  }); });
  // advance buttons
  Array.prototype.forEach.call(el.querySelectorAll(".adv"),function(b){ b.addEventListener("click",function(e){
    if(b.classList.contains("info")||b.hasAttribute("data-scn")) return; next();
  }); });
  // info chips
  Array.prototype.forEach.call(el.querySelectorAll(".info"),function(b){ b.addEventListener("click",function(e){
    e.stopPropagation(); showPop(b, t(b.getAttribute("data-tip")));
  }); });
  // copy buttons (do not advance)
  Array.prototype.forEach.call(el.querySelectorAll(".copy"),function(b){ b.addEventListener("click",function(e){
    e.stopPropagation();
    try{ if(navigator.clipboard) navigator.clipboard.writeText(b.getAttribute("data-copy")); }catch(_){}
    b.textContent=t("lk.copied");
  }); });
  renderCrumbs();
}
function next(){ if(step<SCN[cur].steps.length-1){ step++; renderStage(); } }
function back(){ if(step>0){ step--; renderStage(); } }

function showPop(anchor,text){
  var pop=document.getElementById("pop");
  if(pop.style.display==="block" && pop._a===anchor){ pop.style.display="none"; return; }
  pop.textContent=text; pop.style.display="block"; pop._a=anchor;
  var r=anchor.getBoundingClientRect();
  var top=r.bottom+8+window.scrollY, left=Math.min(r.left+window.scrollX, window.innerWidth-260);
  pop.style.top=top+"px"; pop.style.left=Math.max(10,left)+"px";
}
document.addEventListener("click",function(e){ var pop=document.getElementById("pop");
  if(pop.style.display==="block" && !pop.contains(e.target) && !(e.target.classList&&e.target.classList.contains("info"))) pop.style.display="none"; });

function renderChrome(){
  document.getElementById("subt").textContent=t("ui.sub");
  document.getElementById("demoBadge").textContent=t("ui.demo");
  document.getElementById("backL").textContent=t("ui.back");
  document.getElementById("nextL").textContent=t("ui.next");
  document.getElementById("whatsH").textContent=t("ui.whats");
  document.getElementById("foot").textContent=t("ui.foot");
  document.documentElement.lang=lang;
}
function renderAll(){ renderChrome(); renderLang(); renderSide(); renderStage(); }

document.getElementById("back").onclick=back;
document.getElementById("next").onclick=next;
renderAll();
</script>
</body>
</html>
