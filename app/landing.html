<style>
  /* ЛЕНДИНГ для незалогиненных (apps.tilley.live/robtop → shell уводит сюда без сессии).
     Standalone, как w.html: без core/*, мини-i18n en/ru/lv внутри
     (?lang → localStorage robtop_locale → язык браузера → en; ключ общий с приложением —
     выбор языка переезжает в приложение). Тема — всегда неон (тема живёт на аккаунте,
     у гостя аккаунта нет). Mobile-first; ≥640px и ≥960px — десктопные сетки.
     Журнал изменений — из changelog.js (window.RT_CHANGELOG), новейшие сверху. */
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--cyan:#19e3ff;--pink:#ff3db0;--magenta:#ff2bd6;--purple:#a64bff;--blue:#3b6bff;--mint:#2bf0c0;
    --gold:#ffd23b;--red:#ff4d6d;--ink:#eaf2ff;--muted:#93a6cf;
    --card:linear-gradient(162deg,rgba(26,23,56,.72),rgba(11,10,28,.74));--line:rgba(255,255,255,.12)}
  html{scroll-behavior:smooth}
  html,body{margin:0;min-height:100%}
  body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#05050f;
    background-image:radial-gradient(820px 600px at 14% 8%,rgba(166,75,255,.20),transparent 60%),
      radial-gradient(820px 680px at 88% 22%,rgba(25,227,255,.15),transparent 60%),
      radial-gradient(900px 800px at 50% 108%,rgba(255,43,214,.18),transparent 60%),
      linear-gradient(180deg,#070617 0%,#05040f 60%,#07041a 100%);min-height:100vh;overflow-x:hidden}
  /* ---- плавающие неоновые орбы (чистый CSS вместо canvas) ---- */
  .orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
  .orbs i{position:absolute;border-radius:50%;filter:blur(26px);opacity:.5;animation:drift 26s ease-in-out infinite alternate}
  .orbs i:nth-child(1){width:140px;height:140px;left:6%;top:12%;background:radial-gradient(circle,rgba(25,227,255,.55),transparent 70%)}
  .orbs i:nth-child(2){width:190px;height:190px;right:-40px;top:30%;background:radial-gradient(circle,rgba(255,43,214,.45),transparent 70%);animation-duration:32s}
  .orbs i:nth-child(3){width:120px;height:120px;left:14%;bottom:18%;background:radial-gradient(circle,rgba(166,75,255,.5),transparent 70%);animation-duration:23s}
  .orbs i:nth-child(4){width:90px;height:90px;right:18%;bottom:8%;background:radial-gradient(circle,rgba(43,240,192,.45),transparent 70%);animation-duration:29s}
  .orbs i:nth-child(5){width:70px;height:70px;left:46%;top:6%;background:radial-gradient(circle,rgba(255,210,59,.4),transparent 70%);animation-duration:35s}
  @keyframes drift{from{transform:translate(0,0)}to{transform:translate(40px,60px)}}
  @media (prefers-reduced-motion:reduce){.orbs i{animation:none}}
  /* ---- верхняя панель ---- */
  .top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:rgba(6,5,20,.78);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07)}
  .brand{font-family:'Russo One',sans-serif;font-size:21px;color:#fff;text-decoration:none;
    text-shadow:0 0 12px rgba(25,227,255,.7),0 0 26px rgba(255,43,214,.5)}
  .brand b{color:var(--pink);font-weight:400}
  .lang{display:flex;gap:4px;margin-left:auto;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;padding:3px}
  .lang button{font-family:inherit;font-weight:800;font-size:11.5px;color:var(--muted);background:none;border:0;border-radius:9px;padding:5px 8px;cursor:pointer}
  .lang button.on{color:#041018;background:linear-gradient(135deg,var(--cyan),#6ea8ff)}
  .toplogin{font-weight:800;font-size:12.5px;color:var(--cyan);text-decoration:none;border:1px solid rgba(25,227,255,.4);
    background:rgba(25,227,255,.1);border-radius:12px;padding:7px 12px;white-space:nowrap}
  /* ---- каркас ---- */
  .wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 40px}
  @media (min-width:640px){.wrap{max-width:640px}}
  @media (min-width:960px){.wrap{max-width:980px}}
  /* ---- герой ---- */
  .hero{text-align:center;padding:42px 0 10px}
  @media (min-width:960px){.hero{padding:64px 0 18px}}
  h1{font-family:'Russo One',sans-serif;font-size:34px;line-height:1.05;margin:14px 0 0;color:#fff;
    text-shadow:0 0 14px rgba(25,227,255,.7),0 0 34px rgba(255,43,214,.5)}
  @media (min-width:960px){h1{font-size:52px}}
  h1 b{color:var(--pink);font-weight:400}
  .heroTag{font-family:'Russo One',sans-serif;font-size:18px;color:var(--cyan);margin-top:10px;
    text-shadow:0 0 10px rgba(25,227,255,.55)}
  @media (min-width:960px){.heroTag{font-size:24px}}
  .heroSub{color:var(--muted);font-weight:600;font-size:14.5px;line-height:1.55;max-width:560px;margin:12px auto 0}
  .cta{display:inline-flex;align-items:center;gap:9px;margin-top:22px;font-family:'Russo One',sans-serif;font-size:16px;
    color:#041018;text-decoration:none;background:linear-gradient(92deg,var(--cyan),#5e8bff 55%,var(--magenta));
    border-radius:16px;padding:15px 26px;box-shadow:0 0 22px rgba(25,227,255,.45),0 10px 30px rgba(0,0,0,.45)}
  .cta:active{transform:scale(.97)}
  .ctaNote{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:10px}
  .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:20px}
  .chips span{font-weight:800;font-size:12px;color:var(--ink);background:rgba(255,255,255,.07);
    border:1px solid var(--line);border-radius:12px;padding:6px 11px}
  .chips span b{color:var(--gold);font-weight:800}
  /* ---- секции ---- */
  .sect{display:flex;align-items:center;gap:9px;font-family:'Russo One',sans-serif;font-size:18px;color:#fff;margin:40px 2px 6px}
  .sect .dot{width:10px;height:10px;border-radius:50%;background:var(--sc,#19e3ff);box-shadow:0 0 12px var(--sc,#19e3ff);flex:none}
  .sectSub{color:var(--muted);font-weight:600;font-size:13.5px;line-height:1.5;margin:0 2px 16px}
  /* ---- как это работает ---- */
  .how{display:grid;gap:10px}
  @media (min-width:640px){.how{grid-template-columns:repeat(3,1fr)}}
  .step{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px}
  .step .n{font-family:'Russo One',sans-serif;font-size:15px;color:#041018;width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--c1),var(--c2));
    box-shadow:0 0 14px var(--c1)}
  .step .t{font-weight:800;font-size:15px;color:#fff;margin-top:10px}
  .step .d{color:var(--muted);font-weight:600;font-size:13px;line-height:1.5;margin-top:5px}
  /* ---- плитки приложений ---- */
  .apps{display:grid;gap:10px}
  @media (min-width:640px){.apps{grid-template-columns:1fr 1fr}}
  @media (min-width:960px){.apps{grid-template-columns:repeat(3,1fr)}}
  .app{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1.5px solid var(--line);
    border-left:4px solid var(--c);border-radius:16px;padding:13px}
  .app .ic{flex:none;width:44px;height:44px;border-radius:13px;color:var(--c);background:rgba(255,255,255,.06);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 14px color-mix(in srgb,var(--c) 35%,transparent)}
  .app .ic svg{width:26px;height:26px}
  .app .t{font-weight:800;font-size:14.5px;color:#fff}
  .app .d{color:var(--muted);font-weight:600;font-size:12.5px;line-height:1.45;margin-top:3px}
  .app.soon{opacity:.55}
  .app.soon .badge{font-size:10.5px;font-weight:800;color:var(--gold);border:1px solid rgba(255,210,59,.45);
    border-radius:9px;padding:2px 7px;margin-left:7px;vertical-align:2px}
  .appsSep{display:flex;align-items:center;gap:10px;color:var(--muted);font-weight:800;font-size:12px;
    text-transform:uppercase;letter-spacing:.8px;margin:20px 2px 12px}
  .appsSep:before,.appsSep:after{content:"";flex:1;height:1px;background:rgba(255,255,255,.12)}
  /* ---- для родителей ---- */
  .feats{display:grid;gap:10px}
  @media (min-width:640px){.feats{grid-template-columns:1fr 1fr}}
  @media (min-width:960px){.feats{grid-template-columns:repeat(3,1fr)}}
  .feat{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px}
  .feat .t{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;color:#fff}
  .feat .t .fdot{width:8px;height:8px;border-radius:50%;background:var(--fc);box-shadow:0 0 10px var(--fc);flex:none}
  .feat .d{color:var(--muted);font-weight:600;font-size:12.5px;line-height:1.5;margin-top:6px}
  /* ---- журнал изменений ---- */
  .log{display:flex;flex-direction:column;gap:8px}
  .logRow{display:flex;gap:10px;align-items:baseline;background:var(--card);border:1.5px solid var(--line);
    border-radius:14px;padding:11px 13px}
  .logRow .v{flex:none;font-weight:800;font-size:11.5px;color:var(--gold);background:rgba(255,210,59,.1);
    border:1px solid rgba(255,210,59,.35);border-radius:9px;padding:3px 8px;white-space:nowrap}
  .logRow .d{flex:1;color:var(--ink);font-weight:600;font-size:13px;line-height:1.5}
  .logRow .dt{color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap}
  @media (max-width:639px){.logRow .dt{display:none}}
  .more{margin-top:12px;width:100%;font-family:inherit;font-weight:800;font-size:13px;color:var(--cyan);
    background:rgba(25,227,255,.08);border:1px solid rgba(25,227,255,.35);border-radius:13px;padding:11px;cursor:pointer}
  /* ---- футер ---- */
  .foot{color:var(--muted);font-size:12px;font-weight:600;text-align:center;margin-top:44px;line-height:1.8}
  .foot a{color:var(--cyan);text-decoration:none;font-weight:700}
</style>

var LANGS=["en","ru","lv"];
function pickLang(){
  var q=new URLSearchParams(location.search).get('lang');
  if(q && T[q]) return q;
  try{ var s=localStorage.getItem('robtop_locale'); if(s && T[s]) return s; }catch(e){}
  var ls=(navigator.languages&&navigator.languages.length)?navigator.languages:[navigator.language||""];
  for(var i=0;i<ls.length;i++){ var c=String(ls[i]||"").slice(0,2).toLowerCase(); if(T[c]) return c; }
  return 'en';
}

function appCard(a,soon){
  var L=T[cur];
  return '<div class="app'+(soon?' soon':'')+'" style="--c:'+a.color+'">'
    +'<span class="ic">'+ICONS[a.icon]+'</span><span><span class="t">'+esc(L.tiles[a.id])
    +(soon?'<span class="badge">'+esc(L.soonSep)+'</span>':'')+'</span>'
    +'<span class="d" style="display:block">'+esc(L.apps[a.id])+'</span></span></div>';
}
function renderLog(){
  var L=T[cur], box=document.getElementById('log'), btn=document.getElementById('logMore');
  var all=(window.RT_CHANGELOG||[]), list=logOpen?all:all.slice(0,6);
  box.innerHTML=list.map(function(e){
    return '<div class="logRow"><span class="v">v'+esc(e.v)+'</span><span class="d">'+esc(e.t[cur]||e.t.en)+'</span><span class="dt">'+esc(e.d)+'</span></div>';
  }).join('')||'<div class="logRow"><span class="d">…</span></div>';
  if(all.length>6){ btn.hidden=false; btn.textContent=logOpen?L.showLess:L.showAll; } else btn.hidden=true;
}
function render(){
  var L=T[cur];
  document.documentElement.lang=cur;
  document.title=L.metaTitle;
  document.querySelector('meta[name="description"]').setAttribute('content',L.metaDesc);
  document.getElementById('topLogin').textContent=L.signIn;
  document.getElementById('heroTag').textContent=L.heroTag;
  document.getElementById('heroSub').textContent=L.heroSub;
  document.getElementById('cta').textContent=L.cta+' →';
  document.getElementById('ctaNote').textContent=L.ctaNote;
  document.getElementById('chips').innerHTML=L.chips.map(function(c){ return '<span>'+esc(c)+'</span>'; }).join('');
  document.getElementById('howH').textContent=L.howH;
  document.getElementById('howSub').textContent=L.howSub;
  document.getElementById('how').innerHTML=L.how.map(function(s,i){
    return '<div class="step" style="--c1:'+STEPC[i][0]+';--c2:'+STEPC[i][1]+'"><span class="n">'+(i+1)+'</span>'
      +'<div class="t">'+esc(s[0])+'</div><div class="d">'+esc(s[1])+'</div></div>';
  }).join('');
  document.getElementById('appsH').textContent=L.appsH;
  document.getElementById('appsSub').textContent=L.appsSub;
  document.getElementById('appsGrid').innerHTML=APPS.map(function(a){ return appCard(a,false); }).join('');
  document.getElementById('soonSep').textContent=L.soonSep;
  document.getElementById('soonGrid').innerHTML=SOON.map(function(a){ return appCard(a,true); }).join('');
  document.getElementById('parH').textContent=L.parH;
  document.getElementById('parSub').textContent=L.parSub;
  document.getElementById('feats').innerHTML=L.feats.map(function(f,i){
    return '<div class="feat" style="--fc:'+FEATC[i]+'"><div class="t"><span class="fdot"></span>'+esc(f[0])+'</div><div class="d">'+esc(f[1])+'</div></div>';
  }).join('');
  document.getElementById('logH').textContent=L.logH;
  document.getElementById('logSub').textContent=L.logSub;
  document.getElementById('footNote').textContent=L.footNote;
  var seg=document.getElementById('langSeg');
  seg.innerHTML=LANGS.map(function(l){
    return '<button type="button"'+(l===cur?' class="on"':'')+' data-l="'+l+'">'+l.toUpperCase()+'</button>';
  }).join('');
  renderLog();
}
document.getElementById('langSeg').addEventListener('click',function(e){
  var b=e.target.closest('button[data-l]'); if(!b) return;
  cur=b.getAttribute('data-l');
  try{ localStorage.setItem('robtop_locale',cur); }catch(err){} // общий ключ — язык переедет в приложение
  render();
});
document.getElementById('logMore').addEventListener('click',function(){ logOpen=!logOpen; renderLog(); });
document.getElementById('ver').textContent=(window.RT_CHANGELOG&&window.RT_CHANGELOG[0])?('v'+window.RT_CHANGELOG[0].v):'';
