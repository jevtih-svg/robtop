<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07061a">
<meta name="robots" content="noindex">
<title>RobTop — Админ</title>
<link rel="icon" type="image/svg+xml" href="media/icon/icon.svg">
<style>
  *{box-sizing:border-box}
  :root{--cyan:#19e3ff;--pink:#ff3db0;--mint:#38e8a0;--gold:#ffd23b;--red:#ff4d6d;--ink:#eaf2ff;--muted:#93a6cf}
  html,body{margin:0;min-height:100%}
  body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#05050f;
    background-image:radial-gradient(900px 600px at 12% 6%,rgba(166,75,255,.18),transparent 60%),
      radial-gradient(900px 700px at 90% 18%,rgba(25,227,255,.13),transparent 60%),
      linear-gradient(180deg,#070617,#05040f 60%,#07041a);min-height:100vh}
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
  .head h1{font-family:'Russo One','Rubik',sans-serif;font-size:19px;margin:0;color:#fff;text-shadow:0 0 12px rgba(25,227,255,.6)}
  .head h1 b{color:var(--pink);font-weight:400}
  .head .sub{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px}
  .tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .nopii{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#bfeaff;
    background:rgba(25,227,255,.12);border:1px solid rgba(25,227,255,.5);padding:4px 9px;border-radius:999px}
  .layout{display:flex;gap:18px;align-items:flex-start;padding:18px 22px 60px;max-width:1240px;margin:0 auto}
  .side{flex:0 0 218px;position:sticky;top:14px}
  .grp{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:10px 6px 4px}
  .nav{display:block;width:100%;text-align:left;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.035);
    color:#dbe6ff;font-family:inherit;font-weight:700;font-size:13.5px;padding:9px 12px;border-radius:11px;margin:5px 0;cursor:pointer}
  .nav:hover{border-color:rgba(25,227,255,.5)}
  .nav.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-color:transparent}
  .main{flex:1;min-width:0}
  .card{background:rgba(10,12,30,.6);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px;margin-bottom:16px}
  .card h2{font-family:'Russo One','Rubik',sans-serif;font-weight:400;font-size:19px;margin:0 0 4px;color:#fff}
  .lead{color:var(--muted);font-size:13px;font-weight:600;margin:0 0 13px;line-height:1.5}
  .bar{display:flex;align-items:flex-start;gap:10px;background:rgba(25,227,255,.09);border:1px solid rgba(25,227,255,.4);
    border-left:4px solid var(--cyan);border-radius:13px;padding:10px 13px;margin-bottom:14px;font-size:12.5px;font-weight:600;color:#d6f3ff;line-height:1.5}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.12)}
  tbody td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.07);font-weight:600;color:#e7eeff;vertical-align:middle}
  .pill{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;background:rgba(25,227,255,.14);color:#bdeeff;border:1px solid rgba(25,227,255,.4);white-space:nowrap}
  .pill.ok{background:rgba(43,240,192,.14);color:var(--mint);border-color:rgba(43,240,192,.45)}
  .pill.warn{background:rgba(255,77,109,.14);color:#ffb3c0;border-color:rgba(255,77,109,.45)}
  .pill.g{background:rgba(255,210,59,.14);color:var(--gold);border-color:rgba(255,210,59,.45)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;cursor:pointer;
    font-family:inherit;font-weight:800;font-size:12px;padding:8px 12px;color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:rgba(255,255,255,.06);color:#cfe0ff;border:1.5px solid rgba(255,255,255,.16)}
  .btn.danger{background:rgba(255,77,109,.14);color:#ffb3c0;border:1.5px solid rgba(255,77,109,.5)}
  .btn.pink{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff}
  .btn.xs{padding:5px 8px;font-size:11px;border-radius:8px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input,select,textarea{border:1.6px solid rgba(255,255,255,.16);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:14px;
    font-weight:600;color:var(--ink);background:rgba(255,255,255,.05);outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
  select option{background:#0c1330}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px}
  .stat .n{font-family:'Russo One','Rubik',sans-serif;font-size:24px;color:#fff}
  .stat .l{font-size:11px;font-weight:700;color:var(--muted);margin-top:2px}
  .spark{display:flex;align-items:flex-end;gap:4px;height:64px;margin-top:8px}
  .spark i{flex:1;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-radius:3px 3px 0 0;min-height:2px}
  .lock{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.28);
    border-radius:9px;padding:4px 8px;font-size:11px;font-weight:700;color:#cdd8f5;white-space:nowrap}
  .fam{border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px;margin-top:10px;background:rgba(255,255,255,.03)}
  .fam.banned{border-color:rgba(255,77,109,.5);background:rgba(255,77,109,.05)}
  .fam .fh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-weight:800}
  .mrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 0;border-top:1px solid rgba(255,255,255,.06);font-size:13px;font-weight:600}
  .mrow .nm{min-width:130px}
  pre{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 11px;font-size:11.5px;
    color:#cfe0ff;overflow:auto;max-width:480px;margin:0;white-space:pre-wrap;word-break:break-all}
  code{background:rgba(255,255,255,.07);border-radius:6px;padding:2px 6px;font-size:12px}
  .log{display:flex;gap:8px;align-items:baseline;padding:3px 2px;border-bottom:1px solid rgba(255,255,255,.05);font-size:11.5px;line-height:1.35}
  .log .t{color:var(--muted);font-weight:700;font-size:10px;flex:0 0 78px;white-space:nowrap}
  .log .pill{font-size:9px;padding:1px 6px}
  .log small{font-size:10px}
  .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:12px;font-size:12px;font-weight:700;color:var(--muted)}
  .modal-ov{position:fixed;inset:0;background:rgba(3,4,14,.72);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#0c1028;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:18px;width:100%;max-width:480px;max-height:84vh;overflow:auto}
  .modal h3{font-family:'Russo One','Rubik',sans-serif;font-weight:400;font-size:17px;margin:0 0 10px;color:#fff}
  .pick{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
    color:#e7eeff;font-family:inherit;font-weight:600;font-size:13px;padding:9px 11px;border-radius:11px;margin-top:7px;cursor:pointer}
  .pick:hover{border-color:rgba(25,227,255,.5)}
  .pick small{color:var(--muted)}
  .fh.click{cursor:pointer}
  .fh.click:hover{color:var(--cyan)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;transition:.2s;
    background:#0c1330;border:1px solid rgba(43,240,192,.5);color:#dffaf0;font-size:13px;font-weight:700;
    padding:11px 16px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:60;pointer-events:none;max-width:84vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .auth{max-width:420px;margin:8vh auto;padding:0 16px}
  .auth input{width:100%;margin-top:10px}
  .auth .btn{width:100%;height:48px;font-size:15px;margin-top:14px;border-radius:24px}
  @media(max-width:860px){ .layout{flex-direction:column} .side{position:static;display:flex;flex-wrap:wrap;gap:6px;width:100%}
    .grp{width:100%} .nav{width:auto;margin:0} }
</style>
</head>
<body>
<div class="head">
  <div><h1>Rob<b>Top</b> · Админ</h1><div class="sub">Мастер-консоль всего приложения</div></div>
  <div class="tools">
    <span class="nopii">🔒 содержимое картинок скрыто</span>
    <span id="who" class="pill g" style="display:none"></span>
    <button id="logout" class="btn ghost xs" style="display:none">Выйти</button>
  </div>
</div>
<div id="app"></div>
<div id="toast"></div>

<script>
"use strict";
var APP=document.getElementById('app');
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(function(){ el.classList.remove('show'); },2400); }
function post(file,body){
  return fetch('api/'+file,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)})
    .then(function(r){ return r.json().catch(function(){return {};}).then(function(j){
      if(!r.ok){ var e=new Error(j&&j.error?j.error:('Ошибка '+r.status)); e.status=r.status; throw e; } return j; }); });
}
function api(op,body){ body=body||{}; body.op=op; return post('admin.php',body); }
function fail(e){ toast('⚠ '+(e&&e.message||'не получилось')); }
function dt(s){ return s?String(s).replace('T',' ').slice(0,16):''; }

/* ================= вход / гейт ================= */
document.getElementById('logout').onclick=function(){ post('accounts.php',{op:'logout'}).then(function(){ location.reload(); }); };
function boot(){
  api('me').then(function(me){
    if(!me.authenticated) return screenLogin();
    if(!me.isAdmin) return screenNoAccess(me);
    document.getElementById('who').style.display='';
    document.getElementById('who').textContent='админ · '+me.user.nickname;
    document.getElementById('logout').style.display='';
    screenPanel();
  }).catch(function(){ screenLogin(); });
}
function screenLogin(){
  APP.innerHTML='<div class="auth"><div class="card"><h2>Вход для администратора</h2>'+
    '<p class="lead">Это служебная консоль. Войдите родительским аккаунтом, у которого есть права админа.</p>'+
    '<input id="lg" type="email" placeholder="Email родителя" autocomplete="username">'+
    '<input id="ps" type="password" placeholder="Пароль" autocomplete="current-password">'+
    '<button class="btn" id="go">Войти</button>'+
    '<p class="lead" style="margin-top:12px">Права выдаёт действующий админ в разделе «Пользователи». Самый первый админ назначается один раз через SQL (см. ПЛАН-мастер-админка.md).</p></div></div>';
  var go=function(){
    post('accounts.php',{op:'login',login:document.getElementById('lg').value.trim(),password:document.getElementById('ps').value})
      .then(function(){ location.reload(); /* перезагрузка = менеджер паролей предлагает сохранение ОДИН раз, здесь и сейчас */ })
      .catch(function(){ toast('Неправильный логин или пароль'); });
  };
  document.getElementById('go').onclick=go;
  document.getElementById('ps').addEventListener('keydown',function(e){ if(e.key==='Enter') go(); });
}
function screenNoAccess(me){
  APP.innerHTML='<div class="auth"><div class="card"><h2>Нет прав администратора</h2>'+
    '<p class="lead">Вы вошли как <b>'+esc(me.user&&me.user.nickname||'')+'</b>, но у этого аккаунта нет флага админа. '+
    'Попросите действующего администратора выдать права (Пользователи → «Сделать админом»).</p>'+
    '<button class="btn ghost" onclick="document.getElementById(\'logout\').click()">Выйти и войти другим аккаунтом</button></div></div>';
  document.getElementById('logout').style.display='';
}

/* ================= каркас панели ================= */
var SECTIONS=[
  ['Консоль',[['dash','Дашборд'],['users','Пользователи'],['families','Семьи'],['invites','Приглашения']]],
  ['Данные',[['content','Контент модулей'],['points','Очки'],['logs','Журнал']]],
  ['Система',[['apps','Приложения'],['mail','Письма'],['admins','Админы и баны']]]
];
var view='dash';
/* Менеджеры паролей (1Password/LastPass/Bitwarden/Dashlane) не должны срабатывать ВНУТРИ панели:
   все поля вне экрана входа помечаем «это не логин-форма», кнопкам даём type=button.
   На экране входа атрибуты autocomplete оставлены как есть — там менеджер ДОЛЖЕН работать. */
function pmGuard(root){
  Array.prototype.forEach.call(root.querySelectorAll('input,select,textarea'),function(el){
    el.setAttribute('autocomplete','off');
    el.setAttribute('data-1p-ignore','');
    el.setAttribute('data-lpignore','true');
    el.setAttribute('data-bwignore','');
    el.setAttribute('data-form-type','other');
  });
  Array.prototype.forEach.call(root.querySelectorAll('button'),function(el){
    if(!el.getAttribute('type')) el.setAttribute('type','button');
  });
}

function screenPanel(){
  var side='';
  SECTIONS.forEach(function(g){
    side+='<div class="grp">'+g[0]+'</div>';
    g[1].forEach(function(v){ side+='<button class="nav'+(v[0]===view?' on':'')+'" data-v="'+v[0]+'">'+v[1]+'</button>'; });
  });
  APP.innerHTML='<div class="layout"><div class="side">'+side+'</div><div class="main">'+
    '<div id="view"><div class="card lead">Загрузка…</div></div></div></div>';
  Array.prototype.forEach.call(APP.querySelectorAll('[data-v]'),function(b){
    b.onclick=function(){ view=b.getAttribute('data-v'); screenPanel(); };
  });
  VIEWS[view]();
}
function V(html){ var el=document.getElementById('view'); el.innerHTML=html; pmGuard(el); }
/* модальное окно: modal(html) → {root, close}; закрытие по фону и Esc */
function modal(html){
  var ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML='<div class="modal">'+html+'</div>';
  document.body.appendChild(ov);
  pmGuard(ov);
  function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); document.removeEventListener('keydown',onk); }
  function onk(e){ if(e.key==='Escape') close(); }
  ov.addEventListener('click',function(e){ if(e.target===ov) close(); });
  document.addEventListener('keydown',onk);
  return {root:ov.firstChild, close:close};
}
/* пагинатор: total, page, per + колбэк */
function pagerHtml(total,page,per){
  var pages=Math.max(1,Math.ceil(total/per));
  return '<div class="pager"><button class="btn ghost xs" id="pgPrev" '+(page<=0?'disabled':'')+'>← Назад</button>'+
    '<span>стр. '+(page+1)+' из '+pages+' · всего '+total+'</span>'+
    '<button class="btn ghost xs" id="pgNext" '+(page>=pages-1?'disabled':'')+'>Вперёд →</button></div>';
}
function wirePager(page,go){
  var p=document.getElementById('pgPrev'), n=document.getElementById('pgNext');
  if(p) p.onclick=function(){ go(page-1); };
  if(n) n.onclick=function(){ go(page+1); };
}
function on(sel,fn){ Array.prototype.forEach.call(document.getElementById('view').querySelectorAll(sel),fn); }

/* ================= разделы ================= */
var VIEWS={

dash:function(){
  api('overview').then(function(r){
    var s=r.stats;
    var tiles=[['Семьи',s.families],['Родители',s.parents],['Дети',s.children],['Заблокированы',s.blocked],
      ['Админы',s.admins],['Баны',s.bans],['Приглашения ждут',s.invitesPending],['Сессии',s.sessions],
      ['Желания',s.wishes],['Записи модулей',s.records],['Картинки 🔒',s.images],['Очки всего',s.pointsTotal],['Событий за 7 дней',s.events7d]];
    var grid=tiles.map(function(t){ return '<div class="stat"><div class="n">'+t[1]+'</div><div class="l">'+t[0]+'</div></div>'; }).join('');
    var mx=1; s.activity14d.forEach(function(d){ if(d.n>mx) mx=d.n; });
    var spark=s.activity14d.map(function(d){ return '<i style="height:'+Math.max(3,Math.round(d.n/mx*100))+'%" title="'+d.day+': '+d.n+'"></i>'; }).join('');
    var byMod=s.recordsByModule.map(function(m){ return '<tr><td>'+esc(m.module)+'</td><td>'+m.n+'</td></tr>'; }).join('');
    V('<div class="card"><h2>Дашборд</h2><p class="lead">Живая статистика по всей системе.</p><div class="stats">'+grid+'</div>'+
      '<div class="grp" style="margin-top:14px">Активность за 14 дней (событий в день)</div><div class="spark">'+spark+'</div></div>'+
      '<div class="card"><h2>Записи по модулям</h2><table><thead><tr><th>Модуль</th><th>Записей</th></tr></thead><tbody>'+byMod+'</tbody></table></div>');
  }).catch(fail);
},

users:function(){
  load('',0);
  function load(q,page){ api('users',{q:q,page:page}).then(function(r){ renderUsers(r.users,q,page,r.total,r.per); }).catch(fail); }
  function openCreate(){
    api('families').then(function(fr){
      var fopts=fr.families.map(function(f){ return '<option value="'+f.id+'">#'+f.id+' · '+esc(f.label||'Семья')+'</option>'; }).join('');
      var m=modal('<h3>Создать пользователя</h3>'+
        '<div class="row"><label><input type="radio" name="ck" value="child" checked> Ребёнок</label>'+
        '<label style="margin-left:14px"><input type="radio" name="ck" value="parent"> Родитель</label></div>'+
        '<input id="cNick" placeholder="Никнейм" style="width:100%;margin-top:10px">'+
        '<div id="childBox" style="margin-top:10px"><div class="grp">Семья ребёнка</div><select id="cFam" style="width:100%">'+fopts+'</select></div>'+
        '<div id="parentBox" style="display:none;margin-top:10px">'+
          '<input id="cEmail" type="email" placeholder="Email родителя" style="width:100%">'+
          '<div class="grp" style="margin-top:8px">Семья</div><select id="cFam2" style="width:100%"><option value="0">Своя новая семья</option>'+fopts+'</select>'+
          '<label style="display:flex;gap:8px;align-items:center;font-weight:700;font-size:13px;margin-top:10px"><input type="checkbox" id="cNotify" checked style="width:auto"> Отправить письмо-приглашение</label>'+
          '<div id="cLangBox"><div class="grp" style="margin-top:8px">Язык письма</div><select id="cLang" style="width:100%">'+
            '<option value="ru">Русский</option><option value="en">English</option><option value="lv">Latviešu</option></select>'+
          '<p class="lead" style="margin-top:8px">Письмо «Вас пригласили в RobTop»: что это за приложение, зачем присоединяться (задания за очки), вход по email + одноразовый 1234.</p></div>'+
        '</div>'+
        '<div class="row" style="margin-top:14px"><button class="btn ghost" id="cCancel">Отмена</button><button class="btn" id="cGo" style="flex:1">Создать</button></div>');
      var kindEls=m.root.querySelectorAll('[name="ck"]');
      Array.prototype.forEach.call(kindEls,function(rd){ rd.onchange=function(){
        var p=m.root.querySelector('[name="ck"]:checked').value==='parent';
        m.root.querySelector('#childBox').style.display=p?'none':'';
        m.root.querySelector('#parentBox').style.display=p?'':'none';
      }; });
      var cNotify=m.root.querySelector('#cNotify');
      cNotify.onchange=function(){ m.root.querySelector('#cLangBox').style.display=cNotify.checked?'':'none'; };
      m.root.querySelector('#cCancel').onclick=m.close;
      m.root.querySelector('#cGo').onclick=function(){
        var kind=m.root.querySelector('[name="ck"]:checked').value;
        var nick=m.root.querySelector('#cNick').value.trim();
        if(!nick){ toast('Введите никнейм'); return; }
        if(kind==='child'){
          api('user_create',{kind:'child',nickname:nick,family_id:parseInt(m.root.querySelector('#cFam').value,10)})
            .then(function(){ m.close(); toast(nick+': создан, пароль для первого входа 1234'); load('',0); }).catch(fail);
        } else {
          var em=m.root.querySelector('#cEmail').value.trim();
          if(!em){ toast('Введите email'); return; }
          var notif=m.root.querySelector('#cNotify').checked;
          api('user_create',{kind:'parent',nickname:nick,email:em,family_id:parseInt(m.root.querySelector('#cFam2').value,10),notify:notif?1:0,lang:m.root.querySelector('#cLang').value})

        '<button class="btn danger xs" data-a="del" data-id="'+u.id+'" data-n="'+esc(u.nickname)+'" title="Удалить аккаунт">🗑</button>';

      '<div class="row" style="margin-bottom:10px"><input id="q" placeholder="Поиск: имя, email, семья…" value="'+esc(q)+'" style="flex:1">'+
      '<button class="btn ghost" id="search">Найти</button><button class="btn" id="createUser">＋ Создать пользователя</button></div>'+
      '<table><thead><tr><th>Имя</th><th>Роль</th><th>Семья</th><th>Статус</th><th>Записи</th><th>Картинки</th><th>Был(а)</th><th>Действия</th></tr></thead><tbody>'+rows+'</tbody></table>'+

        if(a==='block'&&confirm('Заблокировать «'+n+'»? Сессии будут разорваны.')) api('user_block',{user_id:id}).then(done).catch(fail);
        if(a==='unblock') api('user_unblock',{user_id:id}).then(done).catch(fail);
        if(a==='grant'&&confirm('Выдать «'+n+'» ПОЛНЫЕ права администратора?')) api('admin_grant',{user_id:id}).then(done).catch(fail);
        if(a==='revoke'&&confirm('Снять с «'+n+'» права администратора?')) api('admin_revoke',{user_id:id}).then(done).catch(fail);
        if(a==='pts'){ var v=prompt('Сколько очков начислить «'+n+'»? (можно отрицательное)','10');
          if(v&&parseInt(v,10)){ var why=prompt('Причина:','подарок от админа')||''; api('points_grant',{user_id:id,n:parseInt(v,10),reason:why}).then(function(){ toast('Очки начислены'); }).catch(fail); } }

      };

},

families:function(){

      var members=f.members.map(function(m){
        var role=m.role==='child'?'ребёнок':(m.role==='owner'?'родитель (владелец)':'родитель');
        var st=m.status==='active'?'':' <span class="pill warn">блок</span>';
        var acts='';
        if(m.kind==='parent'&&m.role!=='owner') acts+='<button class="btn danger xs" data-a="detach" data-f="'+f.id+'" data-u="'+m.id+'" data-n="'+esc(m.nickname)+'">Отвязать</button>';
        if(m.kind==='child') acts+='<button class="btn ghost xs" data-a="move" data-u="'+m.id+'" data-n="'+esc(m.nickname)+'">Перенести →</button>';
        return '<div class="mrow"><span class="nm"><b>'+esc(m.nickname)+'</b>'+st+'</span><span class="pill">'+role+'</span>'+
          (m.email?'<span style="color:var(--muted)">'+esc(m.email)+'</span>':'')+'<span style="flex:1"></span>'+acts+'</div>';
      }).join('');
      var banBtn=f.banned
        ?'<button class="btn xs" data-a="unban" data-f="'+f.id+'">Снять бан</button>'
        :'<button class="btn danger xs" data-a="ban" data-f="'+f.id+'" data-n="'+esc(f.label||('#'+f.id))+'">🚫 Бан</button>';
      return '<div class="fam'+(f.banned?' banned':'')+'"><div class="fh"><span class="click" data-a="stats" data-f="'+f.id+'" title="Открыть статистику семьи">📊 #'+f.id+' · '+esc(f.label||'Семья')+'</span>'+
        (f.banned?' <span class="pill warn">ЗАБАНЕНА</span>':'')+'<span style="flex:1"></span>'+
        '<button class="btn ghost xs" data-a="rename" data-f="'+f.id+'" data-n="'+esc(f.label||'')+'">✏️</button>'+
        '<button class="btn ghost xs" data-a="attach" data-f="'+f.id+'">＋ Родитель</button>'+banBtn+
        '<button class="btn danger xs" data-a="wipe" data-f="'+f.id+'" data-n="'+esc(f.label||('#'+f.id))+'" title="Полностью удалить семью со всеми детьми и данными">🗑</button></div>'+members+'</div>';
    }).join('');
    V('<div class="card"><h2>Семьи</h2><p class="lead">Клик по названию — статистика семьи. ✏️ переименовать · ＋ привязать родителя (поиск) · 🚫 бан (блок + стоп-лист email) · 🗑 удалить ПОЛНОСТЬЮ со всеми детьми и данными.</p>'+html+'</div>');
    on('[data-a]',function(btn){
      btn.onclick=function(){
        var a=btn.getAttribute('data-a'), f=parseInt(btn.getAttribute('data-f')||'0',10),
            u=parseInt(btn.getAttribute('data-u')||'0',10), n=btn.getAttribute('data-n')||'';
        var done=function(){ toast('Готово'); VIEWS.families(); };
        if(a==='stats') return VIEWS.familyStats(f);
        if(a==='rename'){ var v=prompt('Название семьи:',n); if(v&&v.trim()) api('family_rename',{family_id:f,label:v.trim()}).then(done).catch(fail); }
        if(a==='attach') return openAttachParent(f);
        if(a==='detach'&&confirm('Отвязать родителя «'+n+'» от этой семьи? Его опекунства над детьми семьи будут разорваны (с логом).'))
          api('parent_detach',{family_id:f,user_id:u}).then(done).catch(fail);
        if(a==='move'){ var fid=prompt('Перенести «'+n+'» в семью с ID (владелец станет его основным родителем):');
          if(fid&&parseInt(fid,10)&&confirm('Точно перенести «'+n+'» в семью #'+fid+'? Старые опекунства будут разорваны.'))
            api('child_move',{child_id:u,to_family_id:parseInt(fid,10)}).then(done).catch(fail); }
        if(a==='ban'){ var why=prompt('Причина бана семьи «'+n+'» (увидите её в журнале и списке банов):','по просьбе семьи');
          if(why!==null&&confirm('ЗАБАНИТЬ семью «'+n+'» полностью? Все аккаунты блокируются, email родителей попадают в стоп-лист.'))
            api('family_ban',{family_id:f,reason:why||''}).then(done).catch(fail); }
        if(a==='unban'&&confirm('Снять бан с семьи? Аккаунты снова станут активными.')) api('family_unban',{family_id:f}).then(done).catch(fail);
        if(a==='wipe'){
          var word=prompt('УДАЛИТЬ семью «'+n+'» НАВСЕГДА: все дети, их данные, файлы и события будут стёрты; родители без других семей — тоже. Это нельзя отменить.\n\nНапишите УДАЛИТЬ чтобы подтвердить:');
          if(word!==null && word.trim().toUpperCase()==='УДАЛИТЬ')
            api('family_delete',{family_id:f}).then(function(r){ toast('Удалено: '+(r.wiped||[]).join(', ')); VIEWS.families(); }).catch(fail);
          else if(word!==null) toast('Не подтверждено — ничего не удалено');
        }
      };
    });
  }).catch(fail);
  function openAttachParent(fid){
    var langSel='<div class="grp" style="margin-top:8px">Язык письма</div><select class="apLang" style="width:100%">'+
      '<option value="ru">Русский</option><option value="en">English</option><option value="lv">Latviešu</option></select>';
    var m=modal('<h3>Привязать родителя к семье #'+fid+'</h3><div id="apBody"></div>');
    var body=m.root.querySelector('#apBody');
    function stepSearch(){
      body.innerHTML='<p class="lead">Выберите существующий родительский аккаунт (показаны только не состоящие в этой семье) или создайте нового.</p>'+
        '<input id="apQ" placeholder="Поиск по имени или email…" style="width:100%">'+
        '<div id="apList"><p class="lead" style="margin-top:10px">Загрузка…</p></div>'+
        '<button class="pick" id="apNew" style="border-style:dashed">＋ <b>Создать нового родителя</b> <small>аккаунт + письмо-приглашение</small></button>';
      pmGuard(body);
      var inp=body.querySelector('#apQ'), tm=null;
      inp.addEventListener('input',function(){ clearTimeout(tm); tm=setTimeout(function(){ search(inp.value.trim()); },250); });
      body.querySelector('#apNew').onclick=stepCreate;
      search('');
      setTimeout(function(){ inp.focus(); },100);
    }
    function search(q){
      api('eligible_parents',{family_id:fid,q:q||''}).then(function(r){
        body.querySelector('#apList').innerHTML = r.parents.length
          ? r.parents.map(function(p){ return '<button class="pick apPick" data-id="'+p.id+'" data-n="'+esc(p.nickname)+'" data-e="'+esc(p.email||'')+'">👤 <b>'+esc(p.nickname)+'</b> <small>'+esc(p.email||'')+(p.family?' · сейчас: '+esc(p.family):'')+'</small></button>'; }).join('')
          : '<p class="lead" style="margin-top:10px">Совпадений нет.</p>';
        Array.prototype.forEach.call(body.querySelectorAll('.apPick'),function(b){
          b.onclick=function(){ stepConfirm(parseInt(b.getAttribute('data-id'),10), b.getAttribute('data-n'), b.getAttribute('data-e')); };
        });
      }).catch(fail);
    }
    function stepConfirm(uid,nick,email){
      body.innerHTML='<p class="lead">Привязать <b>'+esc(nick)+'</b>'+(email?' ('+esc(email)+')':'')+' родителем к семье #'+fid+'.</p>'+
        '<label style="display:flex;gap:8px;align-items:center;font-weight:700;font-size:13px"><input type="checkbox" id="apNotify" checked style="width:auto"> Отправить уведомление на email</label>'+
        '<div id="apLangBox">'+langSel+'</div>'+
        '<div class="row" style="margin-top:14px"><button class="btn ghost" id="apBack">‹ Назад</button><button class="btn" id="apGo" style="flex:1">Привязать</button></div>';
      pmGuard(body);
      var cb=body.querySelector('#apNotify');
      cb.onchange=function(){ body.querySelector('#apLangBox').style.display=cb.checked?'':'none'; };
      if(!email){ cb.checked=false; cb.disabled=true; body.querySelector('#apLangBox').style.display='none'; }
      body.querySelector('#apBack').onclick=stepSearch;
      body.querySelector('#apGo').onclick=function(){
        api('parent_attach',{family_id:fid,user_id:uid,notify:cb.checked?1:0,lang:body.querySelector('.apLang').value})
          .then(function(r){
            m.close(); VIEWS.families();
            toast(cb.checked?(r.mailLogOnly?'Привязан. Письмо в журнале (драйвер log)':'Привязан, уведомление отправлено'):'Привязан, без уведомления');
          }).catch(fail);
      };
    }
    function stepCreate(){
      body.innerHTML='<p class="lead">Новый родитель будет создан и сразу привязан к семье #'+fid+'. Вход: email + одноразовый 1234.</p>'+
        '<input id="apNick" placeholder="Никнейм" style="width:100%">'+
        '<input id="apEmail" type="email" placeholder="Email" style="width:100%;margin-top:8px">'+
        '<label style="display:flex;gap:8px;align-items:center;font-weight:700;font-size:13px;margin-top:10px"><input type="checkbox" id="apNotify" checked style="width:auto"> Отправить письмо-приглашение (что за приложение + как войти)</label>'+
        '<div id="apLangBox">'+langSel+'</div>'+
        '<div class="row" style="margin-top:14px"><button class="btn ghost" id="apBack">‹ Назад</button><button class="btn" id="apGo" style="flex:1">Создать и привязать</button></div>';
      pmGuard(body);
      var cb=body.querySelector('#apNotify');
      cb.onchange=function(){ body.querySelector('#apLangBox').style.display=cb.checked?'':'none'; };
      body.querySelector('#apBack').onclick=stepSearch;
      body.querySelector('#apGo').onclick=function(){
        var nick=body.querySelector('#apNick').value.trim(), em=body.querySelector('#apEmail').value.trim();
        if(!nick||!em){ toast('Заполните никнейм и email'); return; }
        api('user_create',{kind:'parent',nickname:nick,email:em,family_id:fid,notify:cb.checked?1:0,lang:body.querySelector('.apLang').value})
          .then(function(r){
            m.close(); VIEWS.families();
            toast(cb.checked?(r.mailLogOnly?'Создан и привязан. Письмо в журнале (драйвер log)':'Создан, приглашение отправлено на '+em):'Создан и привязан, без письма (пароль 1234)');
          }).catch(fail);
      };
      setTimeout(function(){ body.querySelector('#apNick').focus(); },100);
    }
    stepSearch();
  }
},

  }).catch(fail);
  function openRecords(mod,col){

      var rows=r.records.map(function(rec){
        if(mod==='wishlist'){
          var img=rec.hasImage?'<span class="lock">🔒 есть</span> <button class="btn danger xs" data-a="delimg" data-id="'+rec.id+'">убрать</button>':'<span style="color:var(--muted)">нет</span>';
          return '<tr><td>#'+rec.id+'</td><td>'+esc(rec.owner)+'</td><td><b>'+esc(rec.title)+'</b><br><small style="color:var(--muted)">'+esc(rec.note||'')+'</small></td>'+
            '<td>'+esc(rec.status)+'</td><td>'+img+'</td><td><button class="btn danger xs" data-a="del" data-id="'+rec.id+'">🗑</button></td></tr>';
        }
        return '<tr><td>#'+rec.id+'</td><td>'+esc(rec.owner)+'</td><td><pre>'+esc(JSON.stringify(rec.data))+'</pre></td><td>'+esc(rec.status||'')+'</td>'+
          '<td><button class="btn ghost xs" data-a="edit" data-id="'+rec.id+'" data-json="'+esc(JSON.stringify(rec.data))+'">✏️</button> '+
          '<button class="btn danger xs" data-a="del" data-id="'+rec.id+'">🗑</button></td></tr>';
      }).join('');
      var head=mod==='wishlist'?'<th>№</th><th>Чьё</th><th>Желание</th><th>Статус</th><th>Картинка</th><th></th>':'<th>№</th><th>Чьё</th><th>Данные (JSON)</th><th>Статус</th><th></th>';
      V('<div class="card"><button class="btn ghost xs" id="back">‹ Все коллекции</button> '+
        (mod!=='wishlist'?'<button class="btn xs" id="add">＋ Добавить запись</button>':'')+
        '<h2 style="margin-top:10px">'+esc(mod)+(col?' / '+esc(col):'')+'</h2>'+
        '<table><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table></div>');
      document.getElementById('back').onclick=VIEWS.content;
      var add=document.getElementById('add');
      if(add) add.onclick=function(){
        var uid=prompt('ID пользователя-владельца записи:'); if(!uid||!parseInt(uid,10)) return;
        var js=prompt('Данные записи (JSON), например {"n":5,"reason":"тест"}:','{}');
        try{ var data=JSON.parse(js||'{}'); }catch(e){ toast('Некорректный JSON'); return; }
        api('record_add',{module:mod,collection:col||'default',user_id:parseInt(uid,10),data:data})
          .then(function(){ toast('Добавлено'); openRecords(mod,col); }).catch(fail);
      };
      on('[data-a]',function(b){
        b.onclick=function(){
          var id=parseInt(b.getAttribute('data-id'),10), a=b.getAttribute('data-a');
          if(a==='del'&&confirm('Удалить запись #'+id+'? (мягкое удаление, останется в базе)'))
            api('record_delete',{id:id,module:mod}).then(function(){ toast('Удалено'); openRecords(mod,col); }).catch(fail);
          if(a==='delimg'&&confirm('Убрать картинку у записи #'+id+'? Файл будет удалён с диска.'))
            api('image_delete',{id:id}).then(function(){ toast('Картинка удалена'); openRecords(mod,col); }).catch(fail);
          if(a==='edit'){ var js=prompt('Новый JSON записи #'+id+':',b.getAttribute('data-json'));
            if(js===null) return;
            try{ var data=JSON.parse(js); }catch(e){ toast('Некорректный JSON'); return; }
            api('record_update',{id:id,data:data}).then(function(){ toast('Сохранено'); openRecords(mod,col); }).catch(fail); }
        };
      });
    }).catch(fail);
  }
},

points:function(){

      '<td><button class="btn ghost xs" data-grant="'+x.userId+'" data-n="'+esc(x.owner)+'">＋ начислить</button></td></tr>'; }).join('');
    var rows=r.txns.map(function(t){
      var n=t.n>=0?'<span class="pill ok">+'+t.n+'</span>':'<span class="pill warn">'+t.n+'</span>';
      return '<tr><td>#'+t.id+'</td><td>'+esc(t.owner)+'</td><td>'+n+'</td><td>'+esc(t.reason)+'</td><td>'+dt(t.created)+'</td>'+
        '<td><button class="btn ghost xs" data-a="edit" data-id="'+t.id+'" data-vn="'+t.n+'" data-vr="'+esc(t.reason)+'">✏️</button> '+
        '<button class="btn danger xs" data-a="del" data-id="'+t.id+'">🗑</button></td></tr>';

    V('<div class="card"><h2>Очки · балансы</h2><p class="lead">Система очков (модуль «Копилка», леджер bank/points). Начисление может быть и отрицательным — это списание.</p>'+
      '<table><thead><tr><th>Кто</th><th>Баланс</th><th></th></tr></thead><tbody>'+(bal||'<tr><td colspan="3" class="lead">пока пусто</td></tr>')+'</tbody></table></div>'+
      '<div class="card"><h2>Транзакции</h2><table><thead><tr><th>№</th><th>Кто</th><th>Очки</th><th>Причина</th><th>Когда</th><th></th></tr></thead><tbody>'+
      (rows||'<tr><td colspan="6" class="lead">пока пусто</td></tr>')+'</tbody></table></div>');
    on('[data-grant]',function(b){ b.onclick=function(){
      var v=prompt('Сколько очков «'+b.getAttribute('data-n')+'»? (отрицательное = списать)','10');
      if(!v||!parseInt(v,10)) return;
      var why=prompt('Причина:','от админа')||'';
      api('points_grant',{user_id:parseInt(b.getAttribute('data-grant'),10),n:parseInt(v,10),reason:why})
        .then(function(){ toast('Готово'); VIEWS.points(); }).catch(fail); }; });
    on('[data-a]',function(b){ b.onclick=function(){
      var id=parseInt(b.getAttribute('data-id'),10);
      if(b.getAttribute('data-a')==='del'&&confirm('Удалить транзакцию #'+id+'? Баланс пересчитается.'))
        api('points_delete',{id:id}).then(function(){ toast('Удалено'); VIEWS.points(); }).catch(fail);
      if(b.getAttribute('data-a')==='edit'){
        var n=prompt('Сумма:',b.getAttribute('data-vn')); if(!n||!parseInt(n,10)) return;
        var why=prompt('Причина:',b.getAttribute('data-vr'))||'';
        api('points_update',{id:id,n:parseInt(n,10),reason:why}).then(function(){ toast('Сохранено'); VIEWS.points(); }).catch(fail);
      } }; });
  }).catch(fail);
},

mail:function(){
  Promise.all([api('mail_templates'),api('users'),api('mail_log')]).then(function(rr){
    var tpl=rr[0], parents=rr[1].users.filter(function(u){ return u.kind==='parent'&&u.email; }), log=rr[2];
    var drv=tpl.driver==='log'?'<span class="pill warn">драйвер log — письма НЕ уходят, только журнал</span>':'<span class="pill ok">драйвер '+esc(tpl.driver)+'</span>';
    var trows=tpl.templates.map(function(t){ return '<tr><td><code>'+esc(t.action)+'</code></td><td>'+esc(t.desc)+'</td><td>'+esc((t.placeholders||[]).join(' '))+'</td></tr>'; }).join('');
    var opts=parents.map(function(p){ return '<option value="'+p.id+'">'+esc(p.nickname)+' · '+esc(p.email)+'</option>'; }).join('');
    var lrows=log.mails.map(function(m){
      var meta=m.meta||{}; var ok=meta.log_only?'<span class="pill g">журнал</span>':(meta.ok?'<span class="pill ok">ушло</span>':'<span class="pill warn">ошибка</span>');
      return '<div class="log"><div class="t">'+dt(m.created)+'</div><div>'+esc(m.type)+' · '+esc(meta.to||'')+' '+ok+(m.title?' · '+esc(m.title):'')+'</div></div>';
    }).join('');
    V('<div class="card"><h2>Письма</h2><p class="lead">Стандартные триггеры шлются автоматически на языке получателя. Здесь — произвольное письмо родителю. У детей почты нет. '+drv+'</p>'+
      '<div class="row"><select id="mto" style="min-width:240px">'+(opts||'<option value="">нет родителей с email</option>')+'</select>'+
      '<input id="msub" placeholder="Тема" style="flex:1;min-width:180px"></div>'+
      '<textarea id="mtxt" rows="5" placeholder="Текст письма…" style="width:100%;margin-top:10px"></textarea>'+
      '<div class="row" style="margin-top:10px"><button class="btn" id="msend">Отправить</button></div></div>'+
      '<div class="card"><h2>Стандартные триггеры</h2><p class="lead">Реестр api/mail/registry.php, шаблоны en/ru/lv. Новые письма добавляются файлами шаблонов + записью в реестр.</p>'+
      '<table><thead><tr><th>Действие</th><th>Когда уходит</th><th>Подстановки</th></tr></thead><tbody>'+trows+'</tbody></table></div>'+
      '<div class="card"><h2>Журнал почты</h2>'+(lrows||'<p class="lead">пока пусто</p>')+'</div>');
    document.getElementById('msend').onclick=function(){
      var uid=parseInt(document.getElementById('mto').value||'0',10);
      var sub=document.getElementById('msub').value.trim(), txt=document.getElementById('mtxt').value.trim();
      if(!uid||!sub||!txt){ toast('Заполните получателя, тему и текст'); return; }
      api('mail_send',{user_id:uid,subject:sub,text:txt}).then(function(r){
        toast(r.logOnly?'Записано в журнал (драйвер log)':'Письмо отправлено');
        document.getElementById('msub').value=''; document.getElementById('mtxt').value='';
      }).catch(fail);
    };
  }).catch(fail);
},

apps:function(){
  api('modules').then(function(r){
    var list=r.modules;
    var rows=list.map(function(m,i){
      var en=m.enabled?'<span class="pill ok">включён</span>':'<span class="pill warn">выключен</span>';
      var contract=m.admin?'<span class="pill" title="Модуль описал свои данные для админки">админ-контракт</span>':'';
      return '<tr><td><b style="color:'+esc(m.color)+'">'+esc(m.name)+'</b><br><small style="color:var(--muted)">'+esc(m.id)+' · v'+esc(m.version)+' · '+esc(m.source)+'</small></td>'+
        '<td>'+en+' '+contract+'</td>'+
        '<td class="row"><button class="btn ghost xs" data-a="up" data-i="'+i+'">▲</button><button class="btn ghost xs" data-a="down" data-i="'+i+'">▼</button>'+
        '<button class="btn '+(m.enabled?'danger':'')+' xs" data-a="toggle" data-id="'+esc(m.id)+'" data-en="'+(m.enabled?0:1)+'">'+(m.enabled?'Выключить':'Включить')+'</button></td></tr>';
    }).join('');
    V('<div class="card"><h2>Приложения (глобальный реестр)</h2><p class="lead">То же, что видят родители в «Управлении приложениями», но для всей системы: вкл/выкл и порядок плиток в меню. Порядок сохраняется кнопкой после перестановки.</p>'+
      '<table><thead><tr><th>Модуль</th><th>Статус</th><th>Действия</th></tr></thead><tbody>'+rows+'</tbody></table>'+
      '<div class="row" style="margin-top:12px"><button class="btn" id="saveOrder">Сохранить порядок</button></div></div>');
    on('[data-a="toggle"]',function(b){ b.onclick=function(){
      api('module_toggle',{id:b.getAttribute('data-id'),enabled:parseInt(b.getAttribute('data-en'),10)})
        .then(function(){ toast('Готово'); VIEWS.apps(); }).catch(fail); }; });
    on('[data-a="up"],[data-a="down"]',function(b){ b.onclick=function(){
      var i=parseInt(b.getAttribute('data-i'),10), j=b.getAttribute('data-a')==='up'?i-1:i+1;
      if(j<0||j>=list.length) return;
      var t=list[i]; list[i]=list[j]; list[j]=t;
      var tb=b.closest('tbody'), trs=tb.querySelectorAll('tr');
      if(b.getAttribute('data-a')==='up') tb.insertBefore(trs[i],trs[j]); else tb.insertBefore(trs[j],trs[i]);
      Array.prototype.forEach.call(tb.querySelectorAll('tr'),function(tr,k){
        Array.prototype.forEach.call(tr.querySelectorAll('[data-i]'),function(x){ x.setAttribute('data-i',k); });
      });
    }; });
    document.getElementById('saveOrder').onclick=function(){
      api('module_reorder',{order:list.map(function(m){ return m.id; })}).then(function(){ toast('Порядок сохранён'); }).catch(fail);
    };
  }).catch(fail);
},

logs:function(){ renderLogs('',0,0);
  function shortDt(s){ return s?String(s).slice(5,16).replace('T',' ').replace(' ',' · '):''; }
  function renderLogs(mod,uid,page){
    api('logs',{module:mod,user_id:uid,page:page}).then(function(r){
      var opts='<option value="">все модули</option>'+r.modules.map(function(m){ return '<option value="'+esc(m)+'"'+(m===mod?' selected':'')+'>'+esc(m)+'</option>'; }).join('');
      var rows=r.logs.map(function(l){
        return '<div class="log"><div class="t">'+shortDt(l.created)+'</div><div><span class="pill">'+esc(l.module)+'</span> <b>'+esc(l.type)+'</b>'+
          (l.who?' · '+esc(l.who):'')+(l.title?' · '+esc(l.title):'')+(l.itemId?' · #'+l.itemId:'')+
          (l.meta?' <small style="color:var(--muted)">'+esc(JSON.stringify(l.meta))+'</small>':'')+'</div></div>';
      }).join('');
      V('<div class="card"><h2>Журнал</h2>'+
        '<div class="row" style="margin-bottom:8px"><select id="fmod">'+opts+'</select>'+
        '<input id="fuid" type="number" placeholder="ID пользователя" style="width:150px" value="'+(uid||'')+'">'+
        '<button class="btn ghost" id="apply">Фильтр</button></div>'+(rows||'<p class="lead">пусто</p>')+
        pagerHtml(r.total,page,50)+'</div>');
      wirePager(page,function(p){ renderLogs(mod,uid,p); });
      document.getElementById('apply').onclick=function(){
        renderLogs(document.getElementById('fmod').value,parseInt(document.getElementById('fuid').value||'0',10),0);
      };
    }).catch(fail);
  }
},

admins:function(){

        '<td>'+(a.status==='active'?'<button class="btn danger xs" data-id="'+a.id+'" data-n="'+esc(a.nickname)+'">Снять права</button>':'')+'</td></tr>';
    }).join('');
    var brows=rr[1].bans.map(function(b){
      var what=b.kind==='family'?('семья #'+b.familyId+(b.familyLabel?' · '+esc(b.familyLabel):'')):('email '+esc(b.emailHash||''));

      '<div class="card"><h2>Баны</h2><p class="lead">Стоп-лист семей и email (хранится только хэш адреса). Снять бан семьи — в разделе «Семьи».</p>'+

    on('[data-id]',function(b){ b.onclick=function(){
      if(confirm('Снять права администратора с «'+b.getAttribute('data-n')+'»?'))
        api('admin_revoke',{user_id:parseInt(b.getAttribute('data-id'),10)}).then(function(){ toast('Снято'); VIEWS.admins(); }).catch(fail); }; });
  }).catch(fail);
