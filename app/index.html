<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<script>
/* Без зума, как нативное приложение: iOS Safari игнорирует user-scalable=no,
   поэтому пинч и двойной тап гасим жестами; meta закрывает Android и iOS-PWA. */
for(var ev of ['gesturestart','gesturechange','gestureend'])
  document.addEventListener(ev,function(e){e.preventDefault()},{passive:false});
document.addEventListener('dblclick',function(e){e.preventDefault()},{passive:false});
</script>
<meta name="theme-color" content="#07061a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RobTop">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="media/icon/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="media/icon/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="media/icon/icon.svg">
<title>RobTop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- subset: cyrillic (RU) + latin/latin-ext (EN, LV: ā č ē ģ ī ķ ļ ņ š ū ž) -->
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rubik:wght@400;500;600;700;800&display=swap&subset=cyrillic,cyrillic-ext,latin,latin-ext" rel="stylesheet">
<link rel="stylesheet" href="core/ui.css?v=2026.06.10.13">
</head>
<body data-view="home">
<canvas id="bg"></canvas>

<div id="root">
  <!-- ============ HOME ============ -->
  <section id="home" class="view active">
    <div class="hometop">
      <h1 class="brand">Rob<b>Top</b></h1>
      <div class="tagline"><span data-i18n="home.tagline">Choose an app</span> <span class="spark">◆</span></div>
    </div>
    <div class="apps" id="apps"></div>
  </section>

  <!-- ============ MODULE MOUNT POINT ============ -->
  <section id="module-view" class="view"></section>

  <!-- ============ PARENT (родительский read-only дашборд; рисует core/parent.js) ============ -->
  <section id="parent" class="view"></section>

  <!-- ============ LOCK (вход; серверный режим, контент рисует shell) ============ -->
  <section id="lock" class="view"></section>

  <!-- ============ НАСТРОЙКИ (отдельный экран; рисует shell.renderSettings) ============ -->
  <section id="settings" class="view"></section>

  <!-- ============ ОПОВЕЩЕНИЯ (вкладка нижнего меню; рисует core/notify.js renderInto) ============ -->
  <section id="notifications" class="view"></section>
</div>

<!-- HUD -->
<div class="hud" id="hud">
  <div class="hud-l" id="hudL">RobTop</div>
  <div class="hud-c"><div class="big" id="hudCnum">0</div><div class="lbl" id="hudClbl" data-i18n="hud.apps">apps</div></div>
  <div class="hud-r"><div class="big" id="hudRnum">0</div><div class="lbl" id="hudRlbl" data-i18n="hud.available">available</div></div>
</div>

<!-- FAB (общий, управляется модулями через sdk.ui.fab; aria-label выставляет shell при показе) -->
<button class="fab" id="fab" aria-label="Action"></button>

<!-- ⚙ настройки — глобальная кнопка В ШАПКЕ (кластер [🔔][⚙] вверху справа; 🔔 рисует
     core/notify.js; absolute с v.67 — уезжает со скроллом, не висит над контентом).
     Видна на главном экране ребёнка и родительском дашборде (CSS .gear). -->
<button class="gear" id="gearBtn" data-i18n-aria="settings.open" aria-label="Settings">⚙</button>

<!-- Таббар родительского дашборда (рисует core/parent.js). Живёт в body, НЕ в #parent:
     заполненная анимация .view.active с transform делает секцию containing block,
     и fixed-меню внутри неё прилипало к низу длинного списка вместо низа экрана. -->
<nav class="pd-tabbar" id="pdTabs"></nav>

<!-- ЕДИНОЕ НИЖНЕЕ МЕНЮ (ПЛАН-нижнее-меню.md): 5 вкладок — APPS · BANK · CHAT · NOTIFICATIONS · SETTINGS.
     Живёт в body (как #pdTabs/#hud): fixed внутри .view(transform) попал бы в containing-block-ловушку.
     Видно на всех детских экранах (home/модуль/настройки/оповещения); прячется в полноэкранных
     сценах (sdk.ui.hud({hidden:true}) → .rt-bar-hide). Клики делегирует core/shell.js (navTo).
     id оставлен kidBar — на него ссылается shell (показ/скрытие). Верхний хром (🔔/⚙) убран. -->
<nav class="rt-nav" id="kidBar">
  <button class="rt-nav-b" data-nav="apps" data-i18n-aria="nav.apps" aria-label="Apps">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span data-i18n="nav.apps">Apps</span>
  </button>
  <button class="rt-nav-b" data-nav="bank" data-i18n-aria="nav.bank" aria-label="Bank">
    <svg viewBox="0 0 24 24"><path d="M4 10h16l-1 9H5z"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
    <span data-i18n="nav.bank">Bank</span>
  </button>
  <button class="rt-nav-b" data-nav="chat" data-i18n-aria="nav.chat" aria-label="Chat">
    <svg viewBox="0 0 24 24"><path d="M4 5h16v11H9l-4 3z"/></svg>
    <span data-i18n="nav.chat">Chat</span>
  </button>
  <button class="rt-nav-b" data-nav="notifications" data-i18n-aria="nav.notifications" aria-label="Notifications">
    <svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
    <span class="rt-nav-badge" id="rtNavBadge" hidden></span>
    <span data-i18n="nav.notifications">Alerts</span>
  </button>
  <button class="rt-nav-b" data-nav="settings" data-i18n-aria="nav.settings" aria-label="Settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.1 5.1l2.1 2.1M16.8 16.8l2.1 2.1M18.9 5.1l-2.1 2.1M7.2 16.8l-2.1 2.1"/></svg>
    <span data-i18n="nav.settings">Settings</span>
  </button>
</nav>

<!-- Магазин приложений (только родитель; открывается из настроек) -->
<div class="overlay" id="storeOverlay">
  <div class="sheet store" role="dialog" aria-modal="true" data-i18n-aria="store.title" aria-label="Apps">
    <div class="grip"></div>
    <div id="storeBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="demo-badge" id="demoBadge" data-i18n="common.demo">demo</div>

<!-- Индикатор версии (слева внизу). Меняй число при КАЖДОМ обновлении — видно, залилась ли новая версия на сайт. -->
<div class="appver" id="appver">v2026.06.10.13</div>

<!-- Версия приложения = маркер деплоя и cache-busting. Меняй ТОЛЬКО это число при каждом обновлении (11 мест, включая notify).
     + ЛЕНДИНГ: запись о версии в changelog.js (журнал «Что нового») и ?v= у changelog.js в landing.html. -->
<script>window.RT_VER="2026.06.10.13";</script>
<script src="core/util.js?v=2026.06.10.13"></script>
<script src="core/i18n.js?v=2026.06.10.13"></script>
<script src="core/strings.js?v=2026.06.10.13"></script>
<script src="core/bg.js?v=2026.06.10.13"></script>
<script src="core/sdk.js?v=2026.06.10.13"></script>
<script src="core/loader.js?v=2026.06.10.13"></script>
<script src="core/notify.js?v=2026.06.10.13"></script>
<script src="core/parent.js?v=2026.06.10.13"></script>
<script src="core/shell.js?v=2026.06.10.13"></script>
</body>
</html>
