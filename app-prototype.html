<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RobTop — App prototype</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--cyan:#19e3ff;--pink:#ff3db0;--purple:#a64bff;--mint:#38e8a0;--gold:#ffd23b;--red:#ff4d6d;--ink:#eaf2ff;--muted:#93a6cf}
  html,body{margin:0;min-height:100%}
  body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#05050f;
    background-image:radial-gradient(900px 600px at 12% 6%,rgba(166,75,255,.18),transparent 60%),
      radial-gradient(900px 700px at 90% 18%,rgba(25,227,255,.13),transparent 60%),
      linear-gradient(180deg,#070617,#05040f 60%,#07041a);min-height:100vh}
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
  .head h1{font-family:'Russo One','Rubik',sans-serif;font-size:19px;margin:0;color:#fff;text-shadow:0 0 12px rgba(25,227,255,.6)}
  .head h1 b{color:var(--pink);font-weight:400}
  .head .sub{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px}
  .tools{display:flex;align-items:center;gap:10px}
  .demo{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);
    background:rgba(255,210,59,.14);border:1px solid rgba(255,210,59,.45);padding:4px 9px;border-radius:999px}
  .lang{display:flex;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{border:none;background:none;color:#cfe0ff;font-weight:800;font-size:12px;padding:5px 10px;border-radius:999px;cursor:pointer}
  .lang button.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  .stagewrap{display:flex;flex-direction:column;align-items:center;padding:18px 16px 40px}
  .foot{max-width:560px;margin:14px auto 0;color:var(--muted);font-size:12px;text-align:center;line-height:1.5}
  /* phone */
  .phone{position:relative;width:390px;max-width:94vw;border-radius:40px;padding:12px;background:linear-gradient(160deg,#15132e,#0a0920);
    border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 50px -16px var(--cyan)}
  .screen{position:relative;height:720px;max-height:78vh;overflow:auto;border-radius:30px;padding:16px 16px 24px;
    background:radial-gradient(700px 480px at 20% 0%,rgba(166,75,255,.12),transparent 60%),linear-gradient(180deg,#0a0920,#0b0822)}
  .screen::-webkit-scrollbar{width:0}
  .scr{display:flex;flex-direction:column;align-items:stretch;animation:sin .24s ease both}
  .scr > *{flex-shrink:0}
  @keyframes sin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* app header inside phone */
  .apphead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .apphead .brand{font-family:'Russo One','Rubik',sans-serif;font-size:22px;color:#fff;text-shadow:0 0 12px rgba(25,227,255,.6)}
  .apphead .brand b{color:var(--pink);font-weight:400}
  .apphead .sp{flex:1}
  .iconbtn{flex:0 0 auto;width:42px;height:42px;border-radius:13px;border:1.5px solid rgba(255,255,255,.16);cursor:pointer;
    background:rgba(255,255,255,.05);color:#cfe0ff;display:grid;place-items:center;font-size:17px;font-weight:800}
  .avbtn{flex:0 0 auto;width:42px;height:42px;border-radius:13px;border:none;cursor:pointer;display:grid;place-items:center;
    font-weight:800;font-size:16px;color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  .avbtn.p{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff}
  .avbtn.g{background:linear-gradient(180deg,#ffd23b,#e0a400)}
  .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--cyan);margin-bottom:6px;width:100%}
  h2.t{font-family:'Russo One','Rubik',sans-serif;font-weight:400;font-size:21px;margin:0 0 4px;color:#fff;line-height:1.15;width:100%}
  p.lead{color:var(--muted);font-size:13px;font-weight:600;margin:0 0 12px;line-height:1.5;width:100%}
  .muted{color:var(--muted);font-size:12.5px;font-weight:600}
  .sec{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:14px 2px 4px}
  /* tiles */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .tile{position:relative;display:flex;flex-direction:column;gap:9px;align-items:flex-start;border-radius:18px;padding:15px 13px;cursor:pointer;
    text-align:left;font-family:inherit;color:var(--ink);background:linear-gradient(162deg,rgba(26,23,56,.72),rgba(11,10,28,.74));
    border:1.5px solid rgba(255,255,255,.14);transition:transform .12s}
  .tile:active{transform:scale(.96)}
  .tile .ic{font-size:30px;filter:drop-shadow(0 0 8px rgba(25,227,255,.5))}
  .tile .nm{font-weight:700;font-size:14px;color:#eef4ff;line-height:1.2}
  .tile .st{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--cyan)}
  .tile.soon{opacity:.5}
  .tile.soon .st{color:#90a2c6}
  /* rows / cards */
  .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:13px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1);margin-top:9px;width:100%;text-align:left;font-family:inherit;color:var(--ink)}
  button.row{cursor:pointer}
  button.row:active{transform:scale(.98)}
  .av{flex:0 0 auto;width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  .av.p{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff}
  .av.g{background:linear-gradient(180deg,#ffd23b,#e0a400)}
  .av.em{background:linear-gradient(180deg,#2a2350,#171338);border:1px solid rgba(255,255,255,.14);color:#fff;font-size:17px}
  .row .nm{flex:1;min-width:0;font-weight:700;font-size:14px}
  .row .nm small{display:block;color:var(--muted);font-weight:600;font-size:11.5px;margin-top:1px}
  .pill{flex:0 0 auto;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;background:rgba(25,227,255,.14);color:#bdeeff;border:1px solid rgba(25,227,255,.4)}
  .pill.ok{background:rgba(43,240,192,.14);color:var(--mint);border-color:rgba(43,240,192,.45)}
  .pill.g{background:rgba(255,210,59,.14);color:var(--gold);border-color:rgba(255,210,59,.45)}
  .pill.warn{background:rgba(255,77,109,.14);color:#ffb3c0;border-color:rgba(255,77,109,.45)}
  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:50px;border:none;border-radius:25px;cursor:pointer;
    font-family:'Russo One','Rubik',sans-serif;font-size:15px;color:#04212b;margin-top:14px;flex:0 0 auto;
    background:linear-gradient(180deg,#3df0c0,#19c7e0);box-shadow:0 12px 24px -14px var(--cyan)}
  .btn:active{transform:scale(.98)}
  .btn.pink{background:linear-gradient(180deg,#ff5db0,#d51a82);color:#fff;box-shadow:0 12px 24px -14px var(--pink)}
  .btn.ghost{background:rgba(255,255,255,.06);color:#cfe0ff;border:1.5px solid rgba(255,255,255,.16);box-shadow:none;font-family:inherit;font-weight:800}
  .btn.danger{background:rgba(255,77,109,.14);color:#ffb3c0;border:1.5px solid rgba(255,77,109,.5);box-shadow:none;font-family:inherit;font-weight:800}
  /* note (solid callout) */
  .note{position:relative;flex:0 0 auto;width:100%;margin:12px 0 2px;padding:11px 13px 11px 14px;border-radius:13px;
    font-size:12.5px;font-weight:600;line-height:1.55;word-break:break-word;color:#e7eeff;background:#0d1430;
    border:1px solid rgba(255,255,255,.14);border-left:4px solid var(--cyan)}
  .note::before{content:"\2139\FE0F";margin-right:7px;font-size:14px}
  .note.ok{border-left-color:var(--mint)} .note.ok::before{content:"\2705"}
  .note.warn{border-left-color:var(--red);background:#190f1b} .note.warn::before{content:"\26A0\FE0F"}
  .note.gold{border-left-color:var(--gold)} .note.gold::before{content:"\1F511"}
  .note+.btn{margin-top:18px}
  .safebar{margin:10px 0 0;display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:800;color:#ffd9a6;width:100%;
    background:rgba(255,170,40,.12);border:1px solid rgba(255,170,40,.45);border-radius:10px;padding:8px 10px}
  .safelist{list-style:none;margin:8px 0 0;padding:0;width:100%}
  .safelist li{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-radius:12px;margin-top:8px;
    font-size:13px;font-weight:600;line-height:1.45;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
  .safelist li .ic{flex:0 0 auto;font-size:18px;line-height:1.2}
  .safelist li.no{background:rgba(255,77,109,.1);border-color:rgba(255,77,109,.4);color:#ffc2cd}
  .safelist li.yes{background:rgba(43,240,192,.09);border-color:rgba(43,240,192,.4);color:#c7f6e8}
  .safelist li.tell{background:rgba(255,210,59,.1);border-color:rgba(255,210,59,.45);color:#ffe7a6}
  .field{display:flex;align-items:center;flex-wrap:wrap;gap:8px;border:1.5px solid rgba(255,255,255,.16);border-radius:13px;padding:12px 13px;
    background:rgba(255,255,255,.05);font-size:15px;font-weight:600;color:#e9f1ff;word-break:break-word;margin-top:8px;width:100%}
  .field .demoflag{margin-left:auto;font-size:9.5px;font-weight:800;color:var(--gold);background:rgba(255,210,59,.12);
    border:1px solid rgba(255,210,59,.4);padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .linkbox{margin-top:10px;padding:12px 13px;border-radius:13px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.16);
    font-size:12.5px;font-weight:600;color:#cdeeff;word-break:break-all;line-height:1.5;width:100%}
  /* teeth ring mock */
  .ring{width:190px;height:190px;border-radius:50%;margin:14px auto 6px;display:grid;place-items:center;
    border:10px solid rgba(255,255,255,.08);box-shadow:0 0 30px -10px var(--cyan)}
  .ring.run{border-color:rgba(25,227,255,.55)}
  .ring .tm{font-family:'Russo One','Rubik',sans-serif;font-size:40px;color:#fff}
  .npbar{display:flex;align-items:center;gap:10px;width:100%;margin-top:12px;padding:10px 12px;border-radius:14px;
    background:rgba(255,255,255,.05);border:1px solid rgba(25,227,255,.28)}
  .npbar .nm{flex:1;min-width:0;font-weight:700;font-size:13px;color:#e7eeff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .npbar .sk{flex:0 0 auto;width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;color:#04212b;
    display:grid;place-items:center;background:linear-gradient(180deg,#3df0c0,#19c7e0);font-size:15px}
  .stat{display:flex;gap:9px;margin-top:10px;width:100%}
  .stat .box{flex:1;text-align:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:11px 6px}
  .stat .box .n{font-family:'Russo One','Rubik',sans-serif;font-size:22px;color:#fff}
  .stat .box .l{font-size:10.5px;font-weight:700;color:var(--muted);margin-top:3px}
  /* toast + sheet */
  #toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);z-index:40;max-width:84%;display:none;
    background:#0c1330;border:1px solid rgba(25,227,255,.5);color:#dff0ff;font-size:12.5px;font-weight:700;
    padding:10px 14px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.5);text-align:center}
  #sheetWrap{position:absolute;inset:12px;z-index:30;border-radius:30px;background:rgba(4,3,14,.6);backdrop-filter:blur(2px);display:none;align-items:flex-end}
  #sheet{width:100%;border-radius:24px 24px 30px 30px;padding:14px 16px calc(18px);max-height:75%;overflow:auto;
    background:linear-gradient(180deg,#191542,#0c0a24);border-top:1.5px solid rgba(255,61,176,.5)}
  #sheet h3{font-family:'Russo One','Rubik',sans-serif;font-weight:400;font-size:17px;margin:4px 0 10px;color:#fff;text-align:center}
  .grip{width:44px;height:5px;border-radius:3px;background:rgba(255,255,255,.28);margin:2px auto 10px}
</style>
</head>
<body>
<div class="head">
  <div><h1>Rob<b>Top</b> · App</h1><div class="sub" id="subt">Clickable app prototype</div></div>
  <div class="tools"><span class="demo" id="demoBadge">prototype · demo</span><div class="lang" id="lang"></div></div>
</div>
<div class="stagewrap">
  <div class="phone">
    <div class="screen"><div class="scr" id="scr"></div></div>
    <div id="toast"></div>
    <div id="sheetWrap"><div id="sheet"></div></div>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
"use strict";
/* ================= i18n ================= */
var S = {
  "ui.sub":{en:"Clickable app prototype",ru:"Кликабельный прототип приложения",lv:"Klikšķināms lietotnes prototips"},
  "ui.demo":{en:"prototype · demo",ru:"прототип · демо",lv:"prototips · demo"},
  "ui.foot":{en:"Everything is clickable, nothing needs typing. Use the avatar (top right inside the app) to switch accounts or log out. Blocking Sunny really blocks her sign-in. PIN is gone: app management now lives with the parent account.",
    ru:"Всё кликается, ничего не нужно печатать. Аватар справа вверху внутри приложения переключает аккаунты и выходит. Блокировка Sunny реально блокирует её вход. PIN убран: управление приложениями теперь у родительского аккаунта.",
    lv:"Viss ir klikšķināms, nekas nav jāraksta. Avatārs augšā pa labi lietotnē pārslēdz kontus un izrakstās. Sunny bloķēšana tiešām bloķē viņas pieslēgšanos. PIN ir noņemts: lietotņu pārvaldība tagad pieder vecāka kontam."},
  "cta.continue":{en:"Continue",ru:"Продолжить",lv:"Turpināt"},
  "cta.done":{en:"Done",ru:"Готово",lv:"Gatavs"},
  "cta.back":{en:"Back",ru:"Назад",lv:"Atpakaļ"},
  "cta.cancel":{en:"Cancel",ru:"Отмена",lv:"Atcelt"},

  /* login */
  "lg.tag":{en:"Sign in",ru:"Вход",lv:"Pieslēgšanās"},
  "lg.title":{en:"Who is signing in?",ru:"Кто входит?",lv:"Kurš pieslēdzas?"},
  "lg.lead":{en:"Demo accounts, one tap, no passwords to type. Parents sign in with email, children with a nickname.",
    ru:"Демо-аккаунты, вход в один тап, пароли печатать не нужно. Родители входят по email, дети по никнейму.",
    lv:"Demo konti, viens pieskāriens, paroles nav jāraksta. Vecāki pieslēdzas ar e-pastu, bērni ar segvārdu."},
  "lg.alex":{en:"alex@home.lv · password saved",ru:"alex@home.lv · пароль сохранён",lv:"alex@home.lv · parole saglabāta"},
  "lg.robik":{en:"nickname · password saved",ru:"никнейм · пароль сохранён",lv:"segvārds · parole saglabāta"},
  "lg.sunny":{en:"first sign-in · one-time 1234",ru:"первый вход · одноразовый 1234",lv:"pirmā pieslēgšanās · vienreizējais 1234"},
  "lg.sunnyblocked":{en:"blocked by a guardian",ru:"заблокирована опекуном",lv:"bloķēta no aizbildņa"},
  "lg.new":{en:"I am a new parent — create a family",ru:"Я новый родитель — создать семью",lv:"Esmu jauns vecāks — izveidot ģimeni"},
  "lg.how":{en:"How does sign-in work?",ru:"Как работает вход?",lv:"Kā darbojas pieslēgšanās?"},
  "role.pg":{en:"parent/guardian",ru:"родитель/опекун",lv:"vecāks/aizbildnis"},
  "role.child":{en:"child",ru:"ребёнок",lv:"bērns"},
  "tag.guest":{en:"guest",ru:"гость",lv:"viesis"},

  /* auth explain */
  "ax.title":{en:"How sign-in works",ru:"Как устроен вход",lv:"Kā notiek pieslēgšanās"},
  "ax.p1":{en:"Parents sign in with an email and a password.",ru:"Родители входят по email и паролю.",lv:"Vecāki pieslēdzas ar e-pastu un paroli."},
  "ax.p2":{en:"Children sign in with a nickname. Children never have an email.",ru:"Дети входят по никнейму. У детей никогда нет email.",lv:"Bērni pieslēdzas ar segvārdu. Bērniem nekad nav e-pasta."},
  "ax.p3":{en:"A new child gets the one-time 1234 and changes it at first sign-in.",ru:"Новый ребёнок получает одноразовый 1234 и меняет его при первом входе.",lv:"Jauns bērns saņem vienreizējo 1234 un nomaina to pirmajā reizē."},
  "ax.p4":{en:"Only a parent can reset a child password. A parent resets their own by email.",ru:"Сбросить пароль ребёнку может только родитель. Свой родитель сбрасывает по email.",lv:"Bērna paroli atiestata tikai vecāks. Savu vecāks atiestata pa e-pastu."},

  /* register mock */
  "rg.title":{en:"Create your family",ru:"Создайте семью",lv:"Izveidojiet ģimeni"},
  "rg.lead":{en:"Demo: the form is pre-filled, just tap create.",ru:"Демо: форма заполнена, просто нажмите создать.",lv:"Demo: forma aizpildīta, vienkārši nospiediet izveidot."},
  "rg.btn":{en:"Create family",ru:"Создать семью",lv:"Izveidot ģimeni"},

  /* forced + safety */
  "fc.title":{en:"Set a new password",ru:"Задай новый пароль",lv:"Iestati jaunu paroli"},
  "fc.lead":{en:"You signed in with the one-time 1234. Nothing opens until you set your own password.",
    ru:"Ты вошла по одноразовому 1234. Ничего не откроется, пока не придумаешь свой пароль.",
    lv:"Tu pieslēdzies ar vienreizējo 1234. Nekas neatvērsies, kamēr neiestatīsi savu paroli."},
  "fc.new":{en:"New password (not 1234)",ru:"Новый пароль (не 1234)",lv:"Jauna parole (ne 1234)"},
  "fc.btn":{en:"Save and continue",ru:"Сохранить и продолжить",lv:"Saglabāt un turpināt"},
  "sf.title":{en:"Read this first",ru:"Сначала прочитай это",lv:"Vispirms izlasi šo"},
  "sf.lead":{en:"Rules that keep you safe, especially with pictures.",ru:"Правила безопасности, особенно про картинки.",lv:"Drošības noteikumi, īpaši par attēliem."},
  "sf.no1":{en:"Do not photograph people. No faces, no strangers, no friends.",ru:"Не фотографируй людей. Ни лиц, ни незнакомцев, ни друзей.",lv:"Nefotografē cilvēkus. Ne sejas, ne svešiniekus, ne draugus."},
  "sf.no2":{en:"Do not upload photos of yourself.",ru:"Не загружай свои фото.",lv:"Neaugšupielādē savas fotogrāfijas."},
  "sf.yes1":{en:"Only simple objects, or pictures from the internet.",ru:"Только простые предметы или картинки из интернета.",lv:"Tikai vienkārši priekšmeti vai attēli no interneta."},
  "sf.priv":{en:"Your pictures are private: only you and your parent can see them.",ru:"Твои картинки приватные: их видишь только ты и твой родитель.",lv:"Tavi attēli ir privāti: tos redz tikai tu un tavs vecāks."},
  "sf.tell":{en:"If anyone asks for anything else, tell your parent and a grown-up right now.",ru:"Если кто-то просит другое, сразу скажи родителю и взрослому.",lv:"Ja kāds prasa ko citu, uzreiz pasaki vecākam un pieaugušajam."},
  "sf.btn":{en:"I understand",ru:"Я понимаю",lv:"Es saprotu"},
  "safebar":{en:"No people or selfies. Pictures stay private.",ru:"Без людей и селфи. Картинки приватные.",lv:"Bez cilvēkiem un selfijiem. Attēli ir privāti."},

  /* child home */
  "ch.hi":{en:"Hi, {name}!",ru:"Привет, {name}!",lv:"Sveiks, {name}!"},
  "ch.pick":{en:"Pick an app",ru:"Выбери приложение",lv:"Izvēlies lietotni"},
  "tile.teeth":{en:"Teeth timer",ru:"Чистка зубов",lv:"Zobu taimeris"},
  "tile.wish":{en:"Wishlist",ru:"Виш-лист",lv:"Vēlmju saraksts"},
  "tile.words":{en:"Backwards words",ru:"Слова наоборот",lv:"Vārdi otrādi"},
  "tile.mood":{en:"Mood",ru:"Настроение",lv:"Garastāvoklis"},
  "tile.bank":{en:"Piggy bank",ru:"Копилка",lv:"Krājkasīte"},

function go(id){ ST.stack.push(ST.screen); ST.screen=id; render(); }
function back(){ ST.screen = ST.stack.pop() || homeId(); render(); }
function home(){ ST.stack=[]; ST.screen=homeId(); render(); }
function homeId(){ if(!ST.acct) return "login"; return ACC[ST.acct].kind==="parent" ? "parentHome" : "childHome"; }
function toast(msg){ var el=document.getElementById("toast"); el.textContent=msg; el.style.display="block";
  clearTimeout(el._t); el._t=setTimeout(function(){ el.style.display="none"; },2200); }

function loginAs(id){
  if(id==="sunny" && ST.sunnyBlocked){ ST.acct=null; ST.stack=[]; ST.screen="disabled"; render(); return; }
  ST.acct=id; ST.stack=[];
  if(id==="sunny" && ST.sunnyMustChange){ ST.screen="forced"; }
  else { ST.screen=homeId(); }
  render(); closeSheet();
}
function logout(){ ST.acct=null; ST.stack=[]; ST.screen="login"; render(); closeSheet(); }

  var a = ST.acct ? ACC[ST.acct] : null;

function field(labelKey,val){ return '<label class="muted" style="margin:10px 0 4px;display:block;font-weight:800">'+t(labelKey)+'</label>'+

function row(av,cls,name,sub,pillHtml,act){
  var tag=act?'button':'div';

}

      '<button class="btn ghost" data-act="resetSunny">'+t("mg.reset")+'</button>'+
      '<button class="btn ghost" data-act="goto:inviteLink">'+t("mg.attach")+'</button>';
  },

  blockConfirm:function(){ return appHead(true)+'<span class="tag">⚠️</span><h2 class="t">'+t("bc.title")+'</h2>'+
    '<p class="lead">'+t("bc.lead")+'</p>'+
    '<button class="btn danger" data-act="blockYes">'+t("bc.yes")+'</button>'+
    '<button class="btn ghost" data-act="back">'+t("cta.cancel")+'</button>'; },

  inviteLink:function(){ return appHead(true)+'<span class="tag">🔗</span><h2 class="t">'+t("lk.title")+'</h2>'+
    '<p class="lead">'+t("lk.lead")+'</p>'+
    '<div class="linkbox">https://apps.tilley.live/robtop/?invite=ab12cd34…</div>'+
    '<button class="btn ghost" data-act="copy">'+t("lk.copy")+'</button>'+
    '<button class="btn" data-act="back">'+t("cta.done")+'</button>'; },

  appsStub:function(){ return appHead(true)+'<span class="tag">⚙</span><h2 class="t">'+t("as.title")+'</h2>'+
    '<div class="note ok">'+t("as.note")+'</div>'+
    '<button class="btn ghost" data-act="back">'+t("cta.back")+'</button>'; },

  disabled:function(){ return '<div class="apphead"><span class="brand">Rob<b>Top</b></span></div>'+
    '<div style="font-size:44px;text-align:center;margin:10px 0">⛔</div>'+
    '<h2 class="t" style="text-align:center">'+t("dis.title")+'</h2>'+
    '<div class="note warn">'+t("dis.lead")+'</div>'+
    '<button class="btn ghost" data-act="goLogin">'+t("cta.back")+'</button>'; }
};
function tile(ic,nm,st,act){
  var soon = act==="soon";
  return '<button class="tile'+(soon?' soon':'')+'" data-act="'+act+'"><span class="ic">'+ic+'</span>'+
    '<span class="nm">'+esc(nm)+'</span><span class="st">'+esc(st)+'</span></button>';
}

/* ================= account switcher sheet ================= */
function openSheet(){
  var cur=ST.acct, html='<div class="grip"></div><h3>'+t("sw.title")+'</h3>';
  ["alex","robik","sunny"].forEach(function(id){
    var a=ACC[id], me=(id===cur);
    var pill = me ? '<span class="pill ok">'+t("sw.you")+'</span>'
      : (id==="sunny"&&ST.sunnyBlocked) ? '<span class="pill warn">'+t("st.blocked")+'</span>'
      : '<span class="pill">'+t("sw.switch")+'</span>';
    html+=row(a.av,a.cls,a.name,a.kind==="parent"?t("role.pg"):(a.kind==="guest"?t("tag.guest"):t("role.child")),pill,me?null:("login:"+id));
  });
  html+='<button class="btn danger" data-act="logout">'+t("sw.logout")+'</button>';
  document.getElementById("sheet").innerHTML=html;
  document.getElementById("sheetWrap").style.display="flex";
  bind(document.getElementById("sheet"));
}
function closeSheet(){ document.getElementById("sheetWrap").style.display="none"; }
document.getElementById("sheetWrap").addEventListener("click",function(e){ if(e.target.id==="sheetWrap") closeSheet(); });

/* ================= actions ================= */
function act(name){
  if(name==="back") return back();
  if(name==="sheet") return openSheet();
  if(name==="logout") return logout();
  if(name==="goLogin"){ ST.acct=null; ST.stack=[]; ST.screen="login"; return render(); }
  if(name.indexOf("login:")===0) return loginAs(name.slice(6));
  if(name.indexOf("goto:")===0) return go(name.slice(5));
  if(name==="register"){ ST.acct="alex"; ST.stack=[]; ST.screen="parentHome"; render(); toast(t("rg.toast")); return; }
  if(name==="forcedDone"){ ST.sunnyMustChange=false; ST.screen = ST.sunnySeenSafety ? homeId() : "safety"; return render(); }
  if(name==="safetyDone"){ ST.sunnySeenSafety=true; return home(); }
  if(name==="startTeeth"){ ST.teeth="run"; return render(); }
  if(name==="finishTeeth"){ ST.teeth="idle"; back(); toast(t("th.done")); return; }
  if(name==="skip"){ ST.track++; render(); toast(t("th.skip")); return; }
  if(name==="uploadOk"){ ST.wish.unshift(["⚽","wl.new","want",false]); back(); toast(t("wl.added")); return; }
  if(name==="blockYes"){ ST.sunnyBlocked=true; back(); render(); toast(t("toast.blocked")); return; }
  if(name==="unblock"){ ST.sunnyBlocked=false; render(); toast(t("toast.unblocked")); return; }
  if(name==="resetSunny"){ ST.sunnyMustChange=true; ST.sunnySeenSafety=false; toast(t("toast.reset")); return; }
  if(name==="copy"){ try{ if(navigator.clipboard) navigator.clipboard.writeText("https://apps.tilley.live/robtop/?invite=ab12cd34…"); }catch(_){}
    toast(t("lk.copied")); return; }
  if(name==="demo"||name==="soon"){ toast(t("toast.demo")); return; }
}
function bind(rootEl){
  Array.prototype.forEach.call(rootEl.querySelectorAll("[data-act]"),function(b){
    b.addEventListener("click",function(e){ e.stopPropagation(); act(b.getAttribute("data-act")); });
  });
}

/* ================= render ================= */
function renderLang(){
  var box=document.getElementById("lang"); box.innerHTML="";
  ["en","ru","lv"].forEach(function(l){ var b=document.createElement("button"); b.textContent=l.toUpperCase();
    if(l===lang) b.className="on"; b.onclick=function(){ lang=l; renderChrome(); render(); }; box.appendChild(b); });
}
function renderChrome(){
  document.getElementById("subt").textContent=t("ui.sub");
  document.getElementById("demoBadge").textContent=t("ui.demo");
  document.getElementById("foot").textContent=t("ui.foot");
  document.documentElement.lang=lang; renderLang();
}
function render(){
  var el=document.getElementById("scr");
  el.innerHTML = (SCR[ST.screen]?SCR[ST.screen]():"");
  el.parentNode.scrollTop=0;
  bind(el);
}
renderChrome(); render();
</script>
</body>
</html>
