<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RobTop — Email prototypes</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--cyan:#19e3ff;--pink:#ff3db0;--purple:#a64bff;--gold:#ffd23b;--ink:#eaf2ff;--muted:#93a6cf}
  html,body{margin:0;min-height:100%}
  body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#05050f;
    background-image:radial-gradient(900px 600px at 14% 6%,rgba(166,75,255,.16),transparent 60%),
      radial-gradient(900px 700px at 88% 16%,rgba(25,227,255,.12),transparent 60%),
      linear-gradient(180deg,#070617,#05040f 60%,#07041a);min-height:100vh}
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
  .head h1{font-family:'Russo One','Rubik',sans-serif;font-size:19px;margin:0;color:#fff;text-shadow:0 0 12px rgba(25,227,255,.6)}
  .head h1 b{color:var(--pink);font-weight:400}
  .head .sub{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px}
  .tools{display:flex;align-items:center;gap:10px}
  .demo{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);
    background:rgba(255,210,59,.14);border:1px solid rgba(255,210,59,.45);padding:4px 9px;border-radius:999px}
  .lang{display:flex;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{border:none;background:none;color:#cfe0ff;font-weight:800;font-size:12px;padding:5px 10px;border-radius:999px;cursor:pointer}
  .lang button.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0)}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px}
  .types{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
  .type{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#dbe6ff;font-family:inherit;font-weight:800;
    font-size:13px;padding:10px 14px;border-radius:12px;cursor:pointer}
  .type.on{color:#04212b;background:linear-gradient(180deg,#3df0c0,#19c7e0);border-color:transparent}
  /* inbox header */
  .meta{font-size:12.5px;color:var(--muted);font-weight:600;margin:0 4px 8px}
  .meta b{color:#dbe9ff}
  /* email card */
  .mail{max-width:560px;margin:0 auto;border-radius:18px;overflow:hidden;box-shadow:0 26px 60px rgba(0,0,0,.5);
    border:1px solid rgba(255,255,255,.1)}
  .mhead{background:linear-gradient(135deg,#1a1340,#2a1666 55%,#3a1d7a);padding:22px 24px;display:flex;align-items:center;gap:10px}
  .mhead .logo{font-family:'Russo One','Rubik',sans-serif;font-size:22px;color:#fff;text-shadow:0 0 14px rgba(25,227,255,.6)}
  .mhead .logo b{color:#ff7ac8;font-weight:400}
  .mbody{background:#f6f7fb;color:#1c2333;padding:26px 26px 22px}
  .mbody h2{font-size:20px;margin:0 0 12px;color:#15182a;line-height:1.25}
  .mbody p{font-size:14.5px;line-height:1.6;margin:0 0 14px;color:#2a3247}
  .mbody .name{font-weight:700}
  .mbtn{display:inline-block;text-decoration:none;color:#04212b;font-family:'Russo One','Rubik',sans-serif;font-size:15px;
    padding:13px 26px;border-radius:26px;background:linear-gradient(180deg,#3df0c0,#19c7e0);box-shadow:0 8px 18px rgba(25,199,224,.4);margin:4px 0 6px}
  .small{font-size:12.5px;color:#5a6480;line-height:1.55}
  .expire{font-size:12.5px;font-weight:700;color:#9a6a00;background:#fff4d6;border:1px solid #ffe49a;border-radius:10px;padding:9px 12px;margin:14px 0}
  .safe{font-size:12.5px;color:#1f5f4a;background:#e6faf2;border:1px solid #b6ecda;border-radius:10px;padding:11px 13px;margin:6px 0 4px;line-height:1.55}
  .safe b{color:#0d7a57}
  .mfoot{border-top:1px solid #e4e7f0;margin-top:16px;padding-top:14px}
  .link{word-break:break-all;color:#6b56d6;font-size:12px;font-weight:600}
  .note{max-width:560px;margin:16px auto 0;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="head">
  <div><h1>Rob<b>Top</b> · Email</h1><div class="sub" id="subt">Transactional email prototypes</div></div>
  <div class="tools"><span class="demo" id="demoBadge">prototype</span><div class="lang" id="lang"></div></div>
</div>
<div class="wrap">
  <div class="types" id="types"></div>
  <div class="meta" id="meta"></div>
  <div class="mail" id="mail"></div>
  <div class="note" id="note"></div>
</div>

<script>
"use strict";
var D = { inviter:"Alex", child:"Sunny", to:"mara@home.lv", reseto:"alex@home.lv",
  link:"https://apps.tilley.live/robtop/?invite=ab12cd34ef…", rlink:"https://apps.tilley.live/robtop/?reset=9f8e7d…" };

var S = {
  "ui.sub":{en:"Transactional email prototypes",ru:"Прототипы писем",lv:"E-pasta prototipi"},
  "ui.demo":{en:"prototype · not sent",ru:"прототип · не отправляется",lv:"prototips · netiek sūtīts"},
  "ui.note":{en:"Mockups only. No email is sent. These are the only emails RobTop sends, and only to parents.",
    ru:"Только макеты. Письма не отправляются. Это единственные письма RobTop, и только родителям.",
    lv:"Tikai maketi. E-pasts netiek sūtīts. Šie ir vienīgie RobTop e-pasti, un tikai vecākiem."},
  "from":{en:"RobTop",ru:"RobTop",lv:"RobTop"},
  "lblfrom":{en:"From",ru:"От",lv:"No"},
  "lblto":{en:"To",ru:"Кому",lv:"Saņēmējs"},
  "lblsubj":{en:"Subject",ru:"Тема",lv:"Tēma"},
  "hello":{en:"Hi,",ru:"Здравствуйте,",lv:"Sveiki,"},
  "donotshare":{en:"Do not share this link with anyone.",ru:"Не пересылайте эту ссылку никому.",lv:"Nedalieties ar šo saiti ne ar vienu."},
  "why":{en:"You got this because your email was used for a RobTop family action. If you did not expect it, ignore this email and nothing changes.",
    ru:"Вы получили это, потому что ваш email использовали для действия в семье RobTop. Если вы этого не ждали, проигнорируйте письмо, ничего не изменится.",
    lv:"Jūs to saņēmāt, jo jūsu e-pasts tika izmantots RobTop ģimenes darbībai. Ja to negaidījāt, ignorējiet šo e-pastu, nekas nemainīsies."},
  "kidsafe":{en:"RobTop is built for child safety. Children sign in with a nickname, never an email. A child can add wishlist pictures, but pictures are never shared anywhere. Only the child and their direct parent can see them, never a temporary guardian.",
    ru:"RobTop сделан для безопасности детей. Дети входят по никнейму, без email. Ребёнок может добавлять картинки в виш-лист, но картинки нигде не публикуются. Их видят только ребёнок и его прямой родитель, и никогда временный опекун.",
    lv:"RobTop ir veidots bērnu drošībai. Bērni pieslēdzas ar segvārdu, nevis e-pastu. Bērns var pievienot vēlmju saraksta attēlus, bet attēli nekur netiek koplietoti. Tos redz tikai bērns un viņa tiešais vecāks, nekad pagaidu aizbildnis."},
  "exp1h":{en:"This link expires in 1 hour and works once.",ru:"Ссылка действует 1 час и один раз.",lv:"Saite ir derīga 1 stundu un vienu reizi."},
  "exp7d":{en:"This link expires in 7 days and works once.",ru:"Ссылка действует 7 дней и один раз.",lv:"Saite ir derīga 7 dienas un vienu reizi."},
  "fallback":{en:"If the button does not work, copy this link:",ru:"Если кнопка не работает, скопируйте ссылку:",lv:"Ja poga nedarbojas, nokopējiet šo saiti:"},

  /* type tabs */
  "tab.reset":{en:"Password reset",ru:"Сброс пароля",lv:"Paroles atiestate"},
  "tab.coparent":{en:"Co-parent invite",ru:"Второй родитель",lv:"Otrs vecāks"},
  "tab.transfer":{en:"Become a parent",ru:"Стать родителем",lv:"Kļūt par vecāku"},

  /* reset */
  "reset.subj":{en:"Reset your RobTop password",ru:"Сброс пароля RobTop",lv:"Atiestatiet RobTop paroli"},
  "reset.body":{en:"We received a request to reset the password for your RobTop parent account. Tap the button to set a new one. If this was not you, ignore this email and your password stays the same.",
    ru:"Мы получили запрос на сброс пароля вашего родительского аккаунта RobTop. Нажмите кнопку, чтобы задать новый. Если это были не вы, проигнорируйте письмо, пароль останется прежним.",
    lv:"Saņēmām pieprasījumu atiestatīt jūsu RobTop vecāka konta paroli. Nospiediet pogu, lai iestatītu jaunu. Ja tas nebijāt jūs, ignorējiet e-pastu, parole paliks tā pati."},
  "reset.btn":{en:"Set a new password",ru:"Задать новый пароль",lv:"Iestatīt jaunu paroli"},

  /* coparent */
  "co.subj":{en:"You are invited to a RobTop family",ru:"Вас приглашают в семью RobTop",lv:"Jūs ielūdz RobTop ģimenē"},
  "co.body":{en:"{inviter} invited you to join their family on RobTop as a second parent. You will be able to see your children's activity and help manage their accounts. Tap to create your parent account and join.",
    ru:"{inviter} приглашает вас в свою семью на RobTop вторым родителем. Вы сможете видеть активность детей и помогать управлять их аккаунтами. Нажмите, чтобы создать родительский аккаунт и присоединиться.",
    lv:"{inviter} ielūdz jūs pievienoties savai ģimenei RobTop kā otram vecākam. Jūs varēsiet redzēt bērnu aktivitāti un palīdzēt pārvaldīt viņu kontus. Nospiediet, lai izveidotu vecāka kontu un pievienotos."},
  "co.btn":{en:"Join the family",ru:"Присоединиться к семье",lv:"Pievienoties ģimenei"},

  /* transfer */
  "tr.subj":{en:"Become {child}'s parent on RobTop",ru:"Станьте родителем {child} на RobTop",lv:"Kļūstiet par {child} vecāku RobTop"},
  "tr.body":{en:"{inviter} set up a RobTop account for a child, {child}, and asked you to be their real parent. Tap to create your parent account. {child} will move into your family and you become their guardian. The temporary link to {inviter} ends, and a record is kept.",
    ru:"{inviter} завёл(а) на RobTop детский аккаунт {child} и просит вас стать его настоящим родителем. Нажмите, чтобы создать родительский аккаунт. {child} перейдёт в вашу семью, и вы станете опекуном. Временная связь с {inviter} прекращается, запись сохраняется.",
    lv:"{inviter} izveidoja RobTop bērna kontu {child} un lūdza jūs kļūt par viņa īsto vecāku. Nospiediet, lai izveidotu vecāka kontu. {child} pāries jūsu ģimenē, un jūs kļūsiet par aizbildni. Pagaidu saite ar {inviter} beidzas, ieraksts tiek saglabāts."},
  "tr.btn":{en:"Create my account",ru:"Создать аккаунт",lv:"Izveidot kontu"}
};

var lang="en", type="reset";
function t(k,vars){ var o=S[k]; var s=o?(o[lang]||o.en||k):k; if(vars){ for(var p in vars) s=s.replace("{"+p+"}",vars[p]); } return s; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

var TYPES = {
  reset:   { subj:"reset.subj", body:"reset.body", btn:"reset.btn", to:D.reseto, link:D.rlink, exp:"exp1h", kid:false },
  coparent:{ subj:"co.subj",    body:"co.body",    btn:"co.btn",    to:D.to,     link:D.link,  exp:"exp7d", kid:true },
  transfer:{ subj:"tr.subj",    body:"tr.body",    btn:"tr.btn",    to:D.to,     link:D.link,  exp:"exp7d", kid:true }
};

function renderLang(){
  var box=document.getElementById("lang"); box.innerHTML="";
  ["en","ru","lv"].forEach(function(l){ var b=document.createElement("button"); b.textContent=l.toUpperCase();
    if(l===lang) b.className="on"; b.onclick=function(){ lang=l; renderAll(); }; box.appendChild(b); });
}
function renderTypes(){
  var box=document.getElementById("types"); box.innerHTML="";
  [["reset","tab.reset"],["coparent","tab.coparent"],["transfer","tab.transfer"]].forEach(function(pair){
    var b=document.createElement("button"); b.className="type"+(type===pair[0]?" on":""); b.textContent=t(pair[1]);
    b.onclick=function(){ type=pair[0]; renderAll(); }; box.appendChild(b);
  });
}
function renderMail(){
  var cfg=TYPES[type]; var vars={inviter:esc(D.inviter), child:esc(D.child)};
  document.getElementById("meta").innerHTML=
    '<b>'+t("lblfrom")+':</b> '+t("from")+' &lt;noreply@tilley.live&gt;　·　<b>'+t("lblto")+':</b> '+esc(cfg.to)+
    '<br><b>'+t("lblsubj")+':</b> '+t(cfg.subj,vars);
  var kid = cfg.kid ? '<div class="safe">🛡 '+t("kidsafe")+'</div>' : '';
  document.getElementById("mail").innerHTML=
    '<div class="mhead"><span class="logo">Rob<b>Top</b></span></div>'+
    '<div class="mbody">'+
      '<h2>'+t(cfg.subj,vars)+'</h2>'+
      '<p>'+t("hello")+'</p>'+
      '<p>'+t(cfg.body,vars)+'</p>'+
      '<p><a class="mbtn" href="#">'+t(cfg.btn)+'</a></p>'+
      '<div class="expire">⏳ '+t(cfg.exp)+' '+t("donotshare")+'</div>'+
      kid+
      '<div class="mfoot">'+
        '<p class="small">'+t("fallback")+'<br><span class="link">'+esc(cfg.link)+'</span></p>'+
        '<p class="small">'+t("why")+'</p>'+
      '</div>'+
    '</div>';
  document.getElementById("note").textContent=t("ui.note");
}
function renderAll(){
  document.getElementById("subt").textContent=t("ui.sub");
  document.getElementById("demoBadge").textContent=t("ui.demo");
  document.documentElement.lang=lang;
  renderLang(); renderTypes(); renderMail();
}
renderAll();
</script>
</body>
</html>
